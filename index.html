<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Nanded GIS Portal</title>

<link rel="stylesheet"
href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Segoe UI, Arial;
}

body{
    display:flex;
    height:100vh;
    overflow:hidden;
}

/* =========================================================
   LOGIN
========================================================= */

#loginOverlay{
    position:fixed;
    inset:0;
    background:rgba(0,0,0,0.85);
    display:flex;
    justify-content:center;
    align-items:center;
    z-index:9999;
}

.loginCard{
    width:340px;
    background:white;
    border-radius:10px;
    padding:25px;
    box-shadow:0 0 20px rgba(0,0,0,0.3);
}

.loginCard h2{
    text-align:center;
    margin-bottom:20px;
    color:#0f172a;
}

.loginCard input{
    width:100%;
    padding:10px;
    margin-top:10px;
    border:1px solid #ccc;
    border-radius:6px;
}

.loginCard button{
    width:100%;
    margin-top:15px;
    padding:10px;
    border:none;
    background:#0284c7;
    color:white;
    border-radius:6px;
    cursor:pointer;
}

#loginError{
    color:red;
    margin-top:10px;
    font-size:13px;
}

/* =========================================================
   SIDEBAR
========================================================= */

#sidebar{
    width:340px;
    background:#0f172a;
    color:white;
    padding:18px;
    display:flex;
    flex-direction:column;
    gap:14px;
    overflow:auto;
}

#sidebar h2{
    text-align:center;
    color:#38bdf8;
}

label{
    font-size:13px;
    color:#cbd5e1;
    font-weight:600;
}

select,input,button{
    width:100%;
    padding:10px;
    border-radius:6px;
    border:none;
    outline:none;
}

select,input{
    background:#1e293b;
    color:white;
    border:1px solid #334155;
}

button{
    background:#0284c7;
    color:white;
    cursor:pointer;
    font-weight:600;
}

button:hover{
    background:#0369a1;
}

.status{
    font-size:12px;
    color:#38bdf8;
    line-height:1.5;
    padding:10px;
    background:#1e293b;
    border-radius:6px;
}

/* =========================================================
   MAP
========================================================= */

#map{
    flex:1;
}

/* =========================================================
   LABELS
========================================================= */

.cadastral-label{
    background:transparent !important;
    border:none !important;
    box-shadow:none !important;
    color:#ffff00 !important;
    font-weight:bold !important;
    font-size:12px !important;

    text-shadow:
        -1px -1px 0 #000,
         1px -1px 0 #000,
        -1px  1px 0 #000,
         1px  1px 0 #000;
}

/* =========================================================
   POPUP
========================================================= */

.popup-table{
    border-collapse:collapse;
    width:100%;
}

.popup-table td{
    border:1px solid #ddd;
    padding:4px 6px;
    font-size:12px;
}

.popup-table tr:nth-child(even){
    background:#f5f5f5;
}

</style>
</head>

<body>

<!-- =====================================================
     LOGIN
====================================================== -->

<div id="loginOverlay">

    <div class="loginCard">

        <h2>Nanded GIS Portal</h2>

        <input
        type="text"
        id="username"
        placeholder="Username">

        <input
        type="password"
        id="password"
        placeholder="Password">

        <button onclick="login()">
            Login
        </button>

        <div id="loginError"></div>

    </div>

</div>

<!-- =====================================================
     SIDEBAR
====================================================== -->

<div id="sidebar">

    <h2>Bhumi Abhilekh</h2>

    <div>
        <label>Select Taluka</label>

        <select id="talukaSelect" disabled>
            <option value="">-- Select Taluka --</option>
        </select>
    </div>

    <div>
        <label>Select Village</label>

        <select id="villageSelect" disabled>
            <option value="">-- Select Village --</option>
        </select>
    </div>

    <div>
        <label>Search Survey/Gat Number</label>

        <input
        type="text"
        id="searchBox"
        placeholder="Enter Survey Number"
        disabled>
    </div>

    <button id="searchBtn" disabled>
        Search Survey
    </button>

    <div class="status" id="statusBox">
        Ready...
    </div>

</div>

<!-- =====================================================
     MAP
====================================================== -->

<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>

/* =========================================================
   USERS
========================================================= */

const users = {

"Ardhapur_taluka":{
    password:"Ardhapur@123",
    access:["Ardhapur"]
},

"Bhokar_taluka":{
    password:"Bhokar@123",
    access:["Bhokar"]
},

"Biloli_taluka":{
    password:"Biloli@123",
    access:["Biloli"]
},

"Deglur_taluka":{
    password:"Deglur@123",
    access:["Deglur"]
},

"Dharmabad_taluka":{
    password:"Dharmabad@123",
    access:["Dharmabad"]
},

"Hadgaon_taluka":{
    password:"Hadgaon@123",
    access:["Hadgaon"]
},

"Himayatnagar_taluka":{
    password:"Himayatnagar@123",
    access:["Himayatnagar"]
},

"Kandhar_taluka":{
    password:"Kandhar@123",
    access:["Kandhar"]
},

"Kinwat_taluka":{
    password:"Kinwat@123",
    access:["Kinwat"]
},

"Loha_taluka":{
    password:"Loha@123",
    access:["Loha"]
},

"Mahur_taluka":{
    password:"Mahur@123",
    access:["Mahur"]
},

"Mudkhed_taluka":{
    password:"Mudkhed@123",
    access:["Mudkhed"]
},

"Mukhed_taluka":{
    password:"Mukhed@123",
    access:["Mukhed"]
},

"Naigaon_taluka":{
    password:"Naigaon@123",
    access:["Naigaon"]
},

"Nanded_taluka":{
    password:"Nanded@123",
    access:["Nanded"]
},

"Umri_taluka":{
    password:"Umri@123",
    access:["Umri"]
},

"Nanded_district":{
    password:"Nanded@123",
    access:"ALL"
},

"Admin":{
    password:"Admin@321",
    access:"ALL"
}

};

/* =========================================================
   MAP
========================================================= */

const map = L.map('map')
.setView([19.1628,77.3183],10);

const googleHybrid = L.tileLayer(
'https://mt1.google.com/vt/lyrs=y&x={x}&y={y}&z={z}',
{
    maxZoom:22
}).addTo(map);

const googleRoad = L.tileLayer(
'https://mt1.google.com/vt/lyrs=m&x={x}&y={y}&z={z}',
{
    maxZoom:22
});

const osm = L.tileLayer(
'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',
{
    maxZoom:19
});

L.control.layers({
    "Google Hybrid":googleHybrid,
    "Google Road":googleRoad,
    "OSM":osm
}).addTo(map);

/* =========================================================
   GLOBALS
========================================================= */

let currentPolygonLayer = null;
let currentLineLayer = null;
let currentPointLayer = null;
let highlightLayer = null;

let activeUser = null;

/* =========================================================
   GITHUB PATHS
========================================================= */

const githubUser =
location.hostname.split('.')[0];

const repoName =
location.pathname.split('/')[1];

const baseURL =
window.location.origin + "/" + repoName + "/";

/* =========================================================
   STATUS
========================================================= */

function setStatus(msg){
    document.getElementById("statusBox")
    .innerHTML = msg;
}

/* =========================================================
   LOGIN
========================================================= */

function login(){

    const username =
    document.getElementById("username")
    .value
    .trim();

    const password =
    document.getElementById("password")
    .value
    .trim();

    if(
        users[username] &&
        users[username].password === password
    ){

        activeUser = users[username];

        document.getElementById("loginOverlay")
        .style.display = "none";

        loadTalukas();

    }else{

        document.getElementById("loginError")
        .innerHTML = "Invalid Login Credentials";
    }
}

/* =========================================================
   LOAD TALUKAS
========================================================= */

function loadTalukas(){

    const talukaSelect =
    document.getElementById("talukaSelect");

    talukaSelect.disabled = false;

    talukaSelect.innerHTML =
    `<option value="">-- Select Taluka --</option>`;

    const talukas = [
        "Ardhapur","Bhokar","Biloli",
        "Deglur","Dharmabad","Hadgaon",
        "Himayatnagar","Kandhar",
        "Kinwat","Loha","Mahur",
        "Mudkhed","Mukhed","Naigaon",
        "Nanded","Umri"
    ];

    talukas.forEach(t=>{

        if(
            activeUser.access === "ALL" ||
            activeUser.access.includes(t)
        ){

            const option =
            document.createElement("option");

            option.value = t;
            option.textContent = t;

            talukaSelect.appendChild(option);
        }
    });

    setStatus("Login successful");
}

/* =========================================================
   TALUKA CHANGE
========================================================= */

document.getElementById("talukaSelect")
.addEventListener("change", async function(){

    const taluka = this.value;

    const villageSelect =
    document.getElementById("villageSelect");

    villageSelect.innerHTML =
    `<option>Loading villages...</option>`;

    villageSelect.disabled = true;

    if(!taluka)
        return;

    try{

        setStatus("Scanning villages...");

        const api =
`https://api.github.com/repos/${githubUser}/${repoName}/contents/${taluka}`;

        const res = await fetch(api);

        if(!res.ok)
            throw new Error("Taluka folder not found");

        const folders = await res.json();

        villageSelect.innerHTML =
        `<option value="">-- Select Village --</option>`;

        let total = 0;

        for(const folder of folders){

            if(folder.type !== "dir")
                continue;

            const villageRes =
            await fetch(folder.url);

            const villageFiles =
            await villageRes.json();

            const hasPolygon =
            villageFiles.some(
                f => f.name === "Polygon.geojson"
            );

            if(hasPolygon){

                const option =
                document.createElement("option");

                option.value = folder.name;
                option.textContent = folder.name;

                villageSelect.appendChild(option);

                total++;
            }
        }

        villageSelect.disabled = false;

        setStatus(
        `✅ ${total} villages found`);

    }catch(err){

        console.error(err);

        setStatus(
        "❌ Failed to scan villages");
    }
});

/* =========================================================
   LOAD VILLAGE
========================================================= */

document.getElementById("villageSelect")
.addEventListener("change", async function(){

    const taluka =
    document.getElementById("talukaSelect")
    .value;

    const village =
    this.value;

    if(!village)
        return;

    try{

        setStatus("Loading village layers...");

        if(currentPolygonLayer)
            map.removeLayer(currentPolygonLayer);

        if(currentLineLayer)
            map.removeLayer(currentLineLayer);

        if(currentPointLayer)
            map.removeLayer(currentPointLayer);

        if(highlightLayer)
            map.removeLayer(highlightLayer);

        /* =================================================
           POLYGON
        ================================================= */

        const polygonURL =
baseURL +
`${taluka}/${village}/Polygon.geojson`;

        console.log(polygonURL);

        const polygonRes =
        await fetch(polygonURL);

        if(!polygonRes.ok)
            throw new Error("Polygon.geojson missing");

        const polygonData =
        await polygonRes.json();

        currentPolygonLayer =
        L.geoJSON(polygonData,{

            style:{
                color:"#ff0000",
                weight:1,
                fillOpacity:0.03
            },

            onEachFeature:(feature,layer)=>{

                const props =
                feature.properties || {};

                const survey =
                props.survey_no ||
                props.Survey_No ||
                props.gat_no ||
                props.Gat_No ||
                props.sr_no;

                if(survey){

                    layer.bindTooltip(
                    String(survey),
                    {
                        permanent:true,
                        direction:"center",
                        className:
                        "cadastral-label"
                    });
                }

                let html =
                `<table class="popup-table">`;

                for(let key in props){

                    html += `
                    <tr>
                        <td><b>${key}</b></td>
                        <td>${props[key]}</td>
                    </tr>`;
                }

                html += `</table>`;

                layer.bindPopup(html);
            }

        }).addTo(map);

        /* =================================================
           LINE
        ================================================= */

        const lineURL =
baseURL +
`${taluka}/${village}/Line.geojson`;

        fetch(lineURL)
        .then(r=>r.json())
        .then(data=>{

            currentLineLayer =
            L.geoJSON(data,{

                style:{
                    color:"#00ffff",
                    weight:2
                }

            }).addTo(map);
        });

        /* =================================================
           POINT
        ================================================= */

        const pointURL =
baseURL +
`${taluka}/${village}/Point.geojson`;

        fetch(pointURL)
        .then(r=>r.json())
        .then(data=>{

            currentPointLayer =
            L.geoJSON(data,{

                pointToLayer:
                (feature,latlng)=>{

                    return L.circleMarker(
                    latlng,{
                        radius:3,
                        color:"yellow",
                        fillColor:"yellow",
                        fillOpacity:1
                    });
                }

            }).addTo(map);
        });

        map.fitBounds(
        currentPolygonLayer.getBounds(),
        {
            padding:[20,20]
        });

        document.getElementById("searchBox")
        .disabled = false;

        document.getElementById("searchBtn")
        .disabled = false;

        setStatus(
        "✅ Village loaded successfully");

    }catch(err){

        console.error(err);

        setStatus(
        "❌ Failed to load village");
    }
});

/* =========================================================
   SEARCH SURVEY
========================================================= */

document.getElementById("searchBtn")
.addEventListener("click", searchSurvey);

document.getElementById("searchBox")
.addEventListener("keypress", function(e){

    if(e.key === "Enter")
        searchSurvey();
});

function searchSurvey(){

    const val =
    document.getElementById("searchBox")
    .value
    .trim()
    .toLowerCase();

    if(!val)
        return;

    if(highlightLayer)
        map.removeLayer(highlightLayer);

    let found = false;

    currentPolygonLayer.eachLayer(layer=>{

        const props =
        layer.feature?.properties || {};

        const survey =
        props.survey_no ||
        props.Survey_No ||
        props.gat_no ||
        props.Gat_No ||
        props.sr_no;

        if(
            survey &&
            String(survey)
            .trim()
            .toLowerCase() === val
        ){

            found = true;

            highlightLayer =
            L.geoJSON(layer.feature,{

                style:{
                    color:"#00ffff",
                    weight:4,
                    fillOpacity:0.35
                }

            }).addTo(map);

            map.fitBounds(
                layer.getBounds(),
                {
                    maxZoom:20,
                    padding:[40,40]
                }
            );

            layer.openPopup();
        }
    });

    if(found){

        setStatus(
        `🎯 Survey No ${val} found`);

    }else{

        setStatus(
        `❌ Survey No not found`);

        alert("Survey number not found");
    }
}

</script>

</body>
</html>
