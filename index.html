<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nanded Survey Number Georeferencing</title>

<!-- LIBRARIES -->
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<link rel="stylesheet" href="https://unpkg.com/leaflet-measure/dist/leaflet-measure.css"/>

<script src="https://cdnjs.cloudflare.com/ajax/libs/proj4js/2.9.0/proj4.js"></script>
<script src="https://cdn.jsdelivr.net/npm/dxf-writer@1.1.0/dist/dxf-writer.min.js"></script>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Segoe UI,Arial,sans-serif;
}

body{
    display:flex;
    height:100vh;
    overflow:hidden;
}

/* LOGIN */
#loginOverlay,
#loadingOverlay{
    position:fixed;
    inset:0;
    background:rgba(0,0,0,0.85);
    display:flex;
    justify-content:center;
    align-items:center;
    z-index:9999;
}

.loginCard{
    width:340px;
    background:white;
    padding:25px;
    border-radius:10px;
}

.loginCard h2{
    margin-bottom:20px;
    text-align:center;
}

.loginCard input{
    width:100%;
    padding:10px;
    margin-top:10px;
    border-radius:6px;
    border:1px solid #ccc;
}

.loginCard button{
    width:100%;
    padding:10px;
    margin-top:15px;
    background:#0284c7;
    color:white;
    border:none;
    border-radius:6px;
    cursor:pointer;
}

#loginError{
    color:red;
    margin-top:10px;
    font-size:13px;
}

/* LOADING */
#loadingOverlay{
    background:rgba(15,23,42,0.8);
    flex-direction:column;
    color:#38bdf8;
    backdrop-filter:blur(3px);
    display:none;
}

.spinner{
    border:4px solid rgba(255,255,255,0.1);
    width:40px;
    height:40px;
    border-radius:50%;
    border-left-color:#38bdf8;
    animation:spin 1s linear infinite;
    margin-bottom:15px;
}

@keyframes spin{
    0%{transform:rotate(0deg);}
    100%{transform:rotate(360deg);}
}

/* SIDEBAR */
#sidebar{
    width:340px;
    background:#0f172a;
    color:white;
    padding:15px;
    display:flex;
    flex-direction:column;
    z-index:2000;
    box-shadow:2px 0 10px rgba(0,0,0,0.5);
}

#sidebar h2{
    text-align:center;
    margin-bottom:20px;
    color:#38bdf8;
}

label{
    font-size:13px;
    font-weight:600;
    display:block;
    margin-top:10px;
}

select,
input,
button{
    width:100%;
    padding:10px;
    margin-top:6px;
    border-radius:6px;
    outline:none;
}

select,
input{
    border:1px solid #334155;
    background:#1e293b;
    color:white;
}

.primary-btn{
    border:none;
    background:#0284c7;
    color:white;
    cursor:pointer;
    font-weight:600;
}

.primary-btn:hover{
    background:#0369a1;
}

#status{
    margin-top:15px;
    background:#1e293b;
    padding:10px;
    border-radius:6px;
    font-size:13px;
    line-height:1.5;
}

/* DOWNLOAD MENU */
.download-menu{
    display:none;
    background:#1e293b;
    padding:10px;
    border-radius:6px;
    margin-top:5px;
    border:1px solid #334155;
}

.download-btn{
    width:100%;
    padding:8px;
    margin-top:5px;
    border:none;
    border-radius:4px;
    cursor:pointer;
    font-size:12px;
    font-weight:600;
    text-align:left;
    color:white;
}

.dxf-btn{
    background:#0284c7;
}

.kml-btn{
    background:#10b981;
}

/* MAP */
#map-wrapper{
    flex:1;
    position:relative;
}

#map{
    height:100%;
    width:100%;
    z-index:1;
}

.leaflet-container:focus{
    outline:none;
}

/* LAYER PANEL */
#layer-panel-wrapper{
    position:absolute;
    top:15px;
    right:15px;
    z-index:1000;
    display:flex;
    flex-direction:column;
    align-items:flex-end;
    gap:10px;
}

#layer-toggle-btn{
    width:44px;
    height:44px;
    background:rgba(15,23,42,0.9);
    border:2px solid #334155;
    border-radius:6px;
    color:white;
    cursor:pointer;
    display:flex;
    justify-content:center;
    align-items:center;
    box-shadow:0 4px 10px rgba(0,0,0,0.3);
    backdrop-filter:blur(4px);
}

#layer-toggle-btn svg{
    width:22px;
    height:22px;
    stroke:#38bdf8;
}

.map-panel{
    background:rgba(15,23,42,0.95);
    border:1px solid #334155;
    border-radius:8px;
    color:white;
    box-shadow:0 4px 15px rgba(0,0,0,0.5);
    backdrop-filter:blur(4px);
    padding:15px;
    width:220px;
    display:none;
}

.map-panel.active{
    display:block;
}

.map-panel h3{
    font-size:13px;
    color:#38bdf8;
    margin-bottom:12px;
    border-bottom:1px solid #334155;
    padding-bottom:4px;
    text-transform:uppercase;
}

.radio-group{
    display:flex;
    flex-direction:column;
    gap:10px;
}

.radio-group div{
    display:flex;
    align-items:center;
    gap:8px;
}

.layer-row{
    margin-top:10px;
}

.layer-row label{
    margin:0 0 4px 0;
}

input[type="range"]{
    width:100%;
}

/* COORDS */
#coords-display{
    position:absolute;
    bottom:15px;
    left:50%;
    transform:translateX(-50%);
    background:rgba(15,23,42,0.8);
    color:#38bdf8;
    padding:4px 12px;
    border-radius:20px;
    font-size:12px;
    font-weight:bold;
    z-index:1000;
    pointer-events:none;
    border:1px solid #334155;
}

/* LABEL */
.cadastral-label{
    background:transparent !important;
    border:none !important;
    box-shadow:none !important;
    color:yellow !important;
    font-weight:bold !important;
    font-size:12px !important;
    text-shadow:
        -1px -1px 0 black,
        1px -1px 0 black,
        -1px 1px 0 black,
        1px 1px 0 black;
}
</style>
</head>

<body>

<!-- LOADING -->
<div id="loadingOverlay">
    <div class="spinner"></div>
    <div>Processing GIS Data...</div>
</div>

<!-- LOGIN -->
<div id="loginOverlay">
    <div class="loginCard">
        <h2>Nanded Survey Georeferencing</h2>

        <input type="text" id="username" placeholder="Username">
        <input type="password" id="password" placeholder="Password">

        <button onclick="login()">Login</button>

        <div id="loginError"></div>
    </div>
</div>

<!-- SIDEBAR -->
<div id="sidebar">

    <h2>Survey Number Maps</h2>

    <label>Select Taluka</label>
    <select id="talukaSelect" disabled>
        <option value="">-- Select Taluka --</option>
    </select>

    <label>Select Village</label>
    <select id="villageSelect" disabled>
        <option value="">-- Select Village --</option>
    </select>

    <label>Search Survey Number</label>
    <input type="text" id="searchBox" placeholder="Enter Survey No" disabled>

    <button id="searchBtn" class="primary-btn" disabled>
        Search Survey
    </button>

    <!-- DOWNLOAD -->
    <div style="margin-top:15px;">

        <button id="downloadBtn"
                class="primary-btn"
                onclick="toggleDownloadMenu()">

            Download Data ⬇️

        </button>

        <div id="downloadMenu" class="download-menu">

            <button class="download-btn dxf-btn"
                    onclick="downloadDXF()">

                Download DXF (AutoCAD)

            </button>

            <button class="download-btn kml-btn"
                    onclick="downloadKML()">

                Download KML (Google Earth)

            </button>

            <p style="font-size:10px;color:#94a3b8;margin-top:8px;">
                *AutoCAD exports in UTM meters
            </p>

        </div>
    </div>

    <div id="status">Ready...</div>

</div>

<!-- MAP -->
<div id="map-wrapper">

    <div id="map"></div>

    <div id="coords-display">
        Lat: 0.00000, Lng: 0.00000
    </div>

    <!-- LAYER PANEL -->
    <div id="layer-panel-wrapper">

        <button id="layer-toggle-btn">

            <svg xmlns="http://www.w3.org/2000/svg"
                 viewBox="0 0 24 24"
                 fill="none"
                 stroke-width="2"
                 stroke-linecap="round"
                 stroke-linejoin="round">

                <polygon points="12 2 2 7 12 12 22 7 12 2"></polygon>
                <polyline points="2 12 12 17 22 12"></polyline>
                <polyline points="2 17 12 22 22 17"></polyline>

            </svg>

        </button>

        <div id="right-layer-panel" class="map-panel">

            <h3>Basemap</h3>

            <div class="radio-group" id="basemap-toggles">

                <div>
                    <input type="radio" name="basemap"
                           value="hybrid" checked>
                    <label>Google Hybrid</label>
                </div>

                <div>
                    <input type="radio" name="basemap"
                           value="satellite">
                    <label>Google Satellite</label>
                </div>

                <div>
                    <input type="radio" name="basemap"
                           value="road">
                    <label>Google Road</label>
                </div>

                <div>
                    <input type="radio" name="basemap"
                           value="osm">
                    <label>OSM</label>
                </div>

                <input type="range"
                       id="op-basemap"
                       min="0"
                       max="1"
                       step="0.1"
                       value="1">

            </div>

            <h3>Layer Opacity</h3>

            <div class="layer-row">
                <label>Polygon Layer</label>
                <input type="range"
                       id="op-polygon"
                       min="0"
                       max="1"
                       step="0.1"
                       value="1">
            </div>

            <div class="layer-row">
                <label>Line Layer</label>
                <input type="range"
                       id="op-line"
                       min="0"
                       max="1"
                       step="0.1"
                       value="1">
            </div>

            <div class="layer-row">
                <label>Point Layer</label>
                <input type="range"
                       id="op-point"
                       min="0"
                       max="1"
                       step="0.1"
                       value="1">
            </div>

        </div>

    </div>

</div>

<!-- SCRIPTS -->
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet-measure/dist/leaflet-measure.js"></script>

<script>

/* USERS */
const users = {
    "Admin":{
        password:"Admin@321",
        access:"ALL"
    },
    "Nanded_district":{
        password:"Nanded@123",
        access:"ALL"
    }
};

/* FIX MAP JUMP */
L.Popup.prototype._adjustPan = function(){};
L.Tooltip.prototype._adjustPan = function(){};

/* MAP */
const map = L.map('map',{
    zoomControl:false,
    doubleClickZoom:false
}).setView([19.16,77.31],10);

L.control.zoom({position:'topleft'}).addTo(map);

L.control.scale({
    imperial:false,
    metric:true,
    position:'bottomleft'
}).addTo(map);

/* MEASURE */
const measureControl = new L.Control.Measure({
    position:'bottomright',
    primaryLengthUnit:'meters',
    secondaryLengthUnit:'kilometers',
    primaryAreaUnit:'sqmeters',
    secondaryAreaUnit:'hectares'
});

measureControl.addTo(map);

/* BASEMAPS */
const basemaps = {

    hybrid:L.tileLayer(
        'https://mt1.google.com/vt/lyrs=y&x={x}&y={y}&z={z}',
        {maxZoom:22}
    ).addTo(map),

    satellite:L.tileLayer(
        'https://mt1.google.com/vt/lyrs=s&x={x}&y={y}&z={z}',
        {maxZoom:22}
    ),

    road:L.tileLayer(
        'https://mt1.google.com/vt/lyrs=m&x={x}&y={y}&z={z}',
        {maxZoom:22}
    ),

    osm:L.tileLayer(
        'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',
        {maxZoom:19}
    )
};

let currentBasemap = basemaps.hybrid;

/* PANEL */
document.getElementById('layer-toggle-btn')
.addEventListener('click',function(){

    document.getElementById('right-layer-panel')
    .classList.toggle('active');

});

/* BASEMAP SWITCH */
document.getElementById('basemap-toggles')
.addEventListener('change',function(e){

    if(e.target.name === 'basemap'){

        map.removeLayer(currentBasemap);

        currentBasemap = basemaps[e.target.value];

        map.addLayer(currentBasemap);

    }

});

/* COORDS */
map.on('mousemove',function(e){

    document.getElementById('coords-display')
    .innerHTML =
    `Lat: ${e.latlng.lat.toFixed(5)}, Lng: ${e.latlng.lng.toFixed(5)}`;

});

/* GLOBALS */
let polygonLayer = null;
let lineLayer = null;
let pointLayer = null;
let highlightLayer = null;
let activeUser = null;

const githubUser = window.location.hostname.split('.')[0];
const repoName = window.location.pathname.split('/')[1];

const baseURL =
window.location.origin + "/" + repoName + "/";

/* STATUS */
function setStatus(msg){
    document.getElementById("status").innerHTML = msg;
}

function showLoading(){
    document.getElementById("loadingOverlay").style.display="flex";
}

function hideLoading(){
    document.getElementById("loadingOverlay").style.display="none";
}

/* LOGIN */
function login(){

    const username =
    document.getElementById("username").value.trim();

    const password =
    document.getElementById("password").value.trim();

    if(users[username] &&
       users[username].password === password){

        activeUser = users[username];

        document.getElementById("loginOverlay")
        .style.display = "none";

        loadTalukas();

    }else{

        document.getElementById("loginError")
        .innerHTML = "Invalid Login";

    }
}

/* LOAD TALUKAS */
async function loadTalukas(){

    try{

        setStatus("Loading Talukas...");

        const res = await fetch(
            `https://api.github.com/repos/${githubUser}/${repoName}/contents`
        );

        const data = await res.json();

        const talukas = data.filter(i=>i.type==="dir");

        const select =
        document.getElementById("talukaSelect");

        select.innerHTML =
        `<option value="">-- Select Taluka --</option>`;

        talukas.forEach(item=>{

            const opt = document.createElement("option");

            opt.value = item.name;
            opt.textContent = item.name;

            select.appendChild(opt);

        });

        select.disabled = false;

        setStatus("✅ Talukas Loaded");

    }catch(err){

        console.error(err);

        setStatus("❌ Taluka Loading Failed");

    }
}

/* LOAD VILLAGES */
document.getElementById("talukaSelect")
.addEventListener("change",async function(){

    const taluka = this.value;

    if(!taluka) return;

    try{

        setStatus("Loading Villages...");

        const res = await fetch(
            `https://api.github.com/repos/${githubUser}/${repoName}/contents/${taluka}`
        );

        const data = await res.json();

        const villages =
        data.filter(i=>i.type==="dir");

        const select =
        document.getElementById("villageSelect");

        select.innerHTML =
        `<option value="">-- Select Village --</option>`;

        villages.forEach(v=>{

            const opt = document.createElement("option");

            opt.value = v.name;
            opt.textContent = v.name;

            select.appendChild(opt);

        });

        select.disabled = false;

        setStatus("✅ Villages Loaded");

    }catch(err){

        console.error(err);

    }

});

/* LOAD GIS */
document.getElementById("villageSelect")
.addEventListener("change",async function(){

    const taluka =
    document.getElementById("talukaSelect").value;

    const village = this.value;

    if(!village) return;

    try{

        showLoading();

        if(polygonLayer) map.removeLayer(polygonLayer);
        if(lineLayer) map.removeLayer(lineLayer);
        if(pointLayer) map.removeLayer(pointLayer);

        const res = await fetch(
            `https://api.github.com/repos/${githubUser}/${repoName}/contents/${taluka}/${village}`
        );

        const files = await res.json();

        let polygonFile = null;
        let lineFile = null;
        let pointFile = null;

        files.forEach(file=>{

            const name = file.name.toLowerCase();

            if(name.includes("polygon") || name.includes("poly"))
                polygonFile = file.name;

            else if(name.includes("line"))
                lineFile = file.name;

            else if(name.includes("point") || name.includes("text"))
                pointFile = file.name;

        });

        /* POLYGON */
        if(polygonFile){

            const polygonData =
            await (
                await fetch(`${baseURL}${taluka}/${village}/${polygonFile}`)
            ).json();

            polygonLayer = L.geoJSON(polygonData,{

                renderer:L.canvas(),

                style:{
                    color:"red",
                    weight:1,
                    fillOpacity:0.02
                },

                onEachFeature:(feature,layer)=>{

                    const props =
                    feature.properties || {};

                    const survey =
                        props.survey_no ||
                        props.Survey_No ||
                        props.gat_no ||
                        props.Gat_No ||
                        props.sr_no ||
                        props.SR_NO ||
                        props.Text ||
                        props.text;

                    if(survey){

                        layer.bindTooltip(
                            String(survey),
                            {
                                permanent:true,
                                direction:"center",
                                className:"cadastral-label"
                            }
                        );

                    }

                }

            }).addTo(map);

            map.fitBounds(
                polygonLayer.getBounds(),
                {
                    padding:[20,20],
                    maxZoom:20
                }
            );
        }

        /* LINE */
        if(lineFile){

            const lineData =
            await (
                await fetch(`${baseURL}${taluka}/${village}/${lineFile}`)
            ).json();

            lineLayer = L.geoJSON(lineData,{

                renderer:L.canvas(),

                style:function(feature){

                    const source =
                    ((feature.properties || {}).sourcel || "")
                    .toString();

                    if(source.includes("Road"))
                        return {
                            color:"black",
                            weight:2
                        };

                    if(source.includes("River") ||
                       source.includes("Nala"))
                        return {
                            color:"blue",
                            weight:2
                        };

                    return {
                        color:"#00ffff",
                        weight:1.5
                    };
                }

            }).addTo(map);

        }

        /* POINT */
        if(pointFile){

            const pointData =
            await (
                await fetch(`${baseURL}${taluka}/${village}/${pointFile}`)
            ).json();

            pointLayer = L.geoJSON(pointData,{

                renderer:L.canvas(),

                pointToLayer:(feature,latlng)=>

                    L.circleMarker(latlng,{
                        radius:0,
                        opacity:0,
                        fillOpacity:0
                    }),

                onEachFeature:(feature,layer)=>{

                    const label =
                    feature.properties.Text ||
                    feature.properties.name;

                    if(label){

                        layer.bindTooltip(
                            String(label),
                            {
                                permanent:true,
                                direction:"top",
                                className:"cadastral-label"
                            }
                        );

                    }

                }

            }).addTo(map);

        }

        document.getElementById("searchBox").disabled=false;
        document.getElementById("searchBtn").disabled=false;

        setStatus("✅ GIS Loaded");

    }catch(err){

        console.error(err);

        setStatus("❌ GIS Loading Failed");

    }finally{

        hideLoading();

    }

});

/* SEARCH */
document.getElementById("searchBtn")
.addEventListener("click",searchSurvey);

function searchSurvey(){

    const val =
    document.getElementById("searchBox")
    .value
    .trim()
    .toLowerCase();

    if(!val || !polygonLayer) return;

    if(highlightLayer)
        map.removeLayer(highlightLayer);

    polygonLayer.eachLayer(layer=>{

        const props =
        layer.feature.properties || {};

        const survey =
            props.survey_no ||
            props.Survey_No ||
            props.gat_no ||
            props.Gat_No ||
            props.sr_no ||
            props.SR_NO;

        if(survey &&
           String(survey).trim().toLowerCase() === val){

            highlightLayer =
            L.geoJSON(layer.feature,{
                style:{
                    color:"#00ffff",
                    weight:4,
                    fillOpacity:0.35
                }
            }).addTo(map);

            map.fitBounds(
                layer.getBounds(),
                {
                    maxZoom:20,
                    padding:[40,40]
                }
            );

        }

    });

}

/* OPACITY */
document.getElementById("op-polygon")
.addEventListener("input",e=>{

    if(polygonLayer){

        const v = parseFloat(e.target.value);

        polygonLayer.setStyle({
            opacity:v,
            fillOpacity:v*0.02
        });

    }

});

document.getElementById("op-line")
.addEventListener("input",e=>{

    if(lineLayer){

        lineLayer.setStyle({
            opacity:parseFloat(e.target.value)
        });

    }

});

document.getElementById("op-point")
.addEventListener("input",e=>{

    if(pointLayer){

        pointLayer.setStyle({
            opacity:parseFloat(e.target.value),
            fillOpacity:parseFloat(e.target.value)
        });

    }

});

/* DOWNLOAD MENU */
function toggleDownloadMenu(){

    const menu =
    document.getElementById("downloadMenu");

    menu.style.display =
    menu.style.display === "block"
    ? "none"
    : "block";

}

/* PROJECTION */
proj4.defs(
    "EPSG:32643",
    "+proj=utm +zone=43 +datum=WGS84 +units=m +no_defs"
);

/* DXF */
function downloadDXF(){

    if(!polygonLayer){

        alert("No data loaded");

        return;
    }

    const dxf = new DxfWriter();

    polygonLayer.eachLayer(layer=>{

        const geom = layer.feature.geometry;

        if(geom.type === "Polygon"){

            exportPolygonToDXF(
                geom.coordinates,
                dxf
            );

        }

    });

    const blob = new Blob(
        [dxf.stringify()],
        {type:'application/dxf'}
    );

    const link =
    document.createElement('a');

    link.href =
    URL.createObjectURL(blob);

    link.download =
    "survey_data.dxf";

    link.click();

}

/* DXF HELPER */
function exportPolygonToDXF(coordsArray,dxf){

    coordsArray.forEach(ring=>{

        const projected = ring.map(c=>{

            const p =
            proj4(
                "EPSG:4326",
                "EPSG:32643",
                c
            );

            return {
                x:p[0],
                y:p[1]
            };

        });

        dxf.addPolyline(projected,true);

    });

}

/* KML */
function downloadKML(){

    if(!polygonLayer){

        alert("No data loaded");

        return;
    }

    let kml =
`<?xml version="1.0" encoding="UTF-8"?>
<kml xmlns="http://www.opengis.net/kml/2.2">
<Document>`;

    polygonLayer.eachLayer(layer=>{

        const coords =
        layer.feature.geometry.coordinates[0];

        kml += `
<Placemark>
<Polygon>
<outerBoundaryIs>
<LinearRing>
<coordinates>`;

        coords.forEach(c=>{

            kml += `${c[0]},${c[1]},0 `;

        });

        kml += `
</coordinates>
</LinearRing>
</outerBoundaryIs>
</Polygon>
</Placemark>`;

    });

    kml += `
</Document>
</kml>`;

    const blob =
    new Blob(
        [kml],
        {
            type:'application/vnd.google-earth.kml+xml'
        }
    );

    const link =
    document.createElement('a');

    link.href =
    URL.createObjectURL(blob);

    link.download =
    "survey_data.kml";

    link.click();

}
</script>

</body>
</html>
