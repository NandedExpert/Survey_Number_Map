<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nanded Survey Number Georeferencing</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<link rel="stylesheet" href="https://unpkg.com/leaflet-measure/dist/leaflet-measure.css"/>

<script src="https://cdnjs.cloudflare.com/ajax/libs/proj4js/2.9.0/proj4.js"></script>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Segoe UI,Arial,sans-serif;
}

body{
    display:flex;
    height:100vh;
    overflow:hidden;
    position:relative;
}

/* LOGIN */
#loginOverlay,
#loadingOverlay{
    position:fixed;
    inset:0;
    background:rgba(0,0,0,0.85);
    display:flex;
    justify-content:center;
    align-items:center;
    z-index:9999;
}

.loginCard{
    width:340px;
    background:white;
    padding:25px;
    border-radius:10px;
}

.loginCard h2{
    margin-bottom:20px;
    text-align:center;
}

.loginCard input{
    width:100%;
    padding:10px;
    margin-top:10px;
    border-radius:6px;
    border:1px solid #ccc;
}

.loginCard button{
    width:100%;
    padding:10px;
    margin-top:15px;
    background:#0284c7;
    color:white;
    border:none;
    border-radius:6px;
    cursor:pointer;
}

#loginError{
    color:red;
    margin-top:10px;
    font-size:13px;
}

/* LOADING */
#loadingOverlay{
    background:rgba(15,23,42,0.85);
    color:#38bdf8;
    flex-direction:column;
    display:none;
}

.spinner{
    border:4px solid rgba(255,255,255,0.1);
    width:40px;
    height:40px;
    border-radius:50%;
    border-left-color:#38bdf8;
    animation:spin 1s linear infinite;
    margin-bottom:15px;
}

@keyframes spin{
    0%{transform:rotate(0deg);}
    100%{transform:rotate(360deg);}
}

/* SIDEBAR */
#sidebar{
    width:340px;
    min-width:340px;
    background:#0f172a;
    color:white;
    padding:15px;
    display:flex;
    flex-direction:column;
    z-index:3000;
    box-shadow:2px 0 10px rgba(0,0,0,0.5);
    transition:0.3s ease;
}

#sidebar.collapsed{
    margin-left:-340px;
}

#sidebar h2 {
    text-align: center;
    margin-bottom: 20px;
    margin-top: 50px; 
    color: #38bdf8;
}

.leaflet-top.leaflet-left {
    margin-top: 60px; 
    margin-left: 10px;
}

/* SIDEBAR TOGGLE */
#sidebarToggle{
    position:absolute;
    top:15px;
    left:15px;
    z-index:4000;
    width:44px;
    height:44px;
    border:none;
    border-radius:6px;
    background:rgba(15,23,42,0.95);
    color:#38bdf8;
    font-size:24px;
    cursor:pointer;
    box-shadow:0 4px 10px rgba(0,0,0,0.4);
}

#sidebarToggle:hover{
    background:#0284c7;
    color:white;
}

label{
    font-size:13px;
    font-weight:600;
    margin-top:10px;
    display:block;
}

select,
input,
button{
    width:100%;
    padding:10px;
    margin-top:6px;
    border-radius:6px;
    outline:none;
}

select,
input{
    border:1px solid #334155;
    background:#1e293b;
    color:white;
}

.primary-btn{
    border:none;
    background:#0284c7;
    color:white;
    cursor:pointer;
    font-weight:600;
}

.primary-btn:hover{
    background:#0369a1;
}

#status{
    margin-top:15px;
    background:#1e293b;
    padding:10px;
    border-radius:6px;
    font-size:13px;
    line-height:1.5;
}

/* DOWNLOAD */
.download-menu{
    display:none;
    background:#1e293b;
    padding:10px;
    border-radius:6px;
    margin-top:5px;
    border:1px solid #334155;
}

.download-btn{
    width:100%;
    padding:8px;
    margin-top:5px;
    border:none;
    border-radius:4px;
    cursor:pointer;
    font-size:12px;
    font-weight:600;
    color:white;
    text-align:left;
}

.dxf-btn{
    background:#0284c7;
}

.kml-btn{
    background:#10b981;
}

/* MAP WRAPPER */
#map-wrapper{
    flex:1;
    position:relative;
}

#map{
    width:100%;
    height:100%;
}

.leaflet-container:focus{
    outline:none;
}

/* LOCATION BUTTON */
#location-btn {
    position: absolute;
    top: 15px;
    right: 75px;
    z-index: 1000;
    width: 44px;
    height: 44px;
    background: rgba(15,23,42,0.9);
    border: 2px solid #334155;
    border-radius: 60px;
    color: #38bdf8;
    font-size: 20px;
    cursor: pointer;
    display: flex;
    justify-content: center;
    align-items: center;
    box-shadow: 0 2px 6px rgba(0,0,0,0.3);
}
#location-btn:hover {
    background: #0284c7;
    color: white;
}

/* LAYER PANEL WRAPPER & RE-ENGINEERED PANEL */
#layer-panel-wrapper{
    position:absolute;
    top:15px;
    right:15px;
    z-index:1000;
    display: flex;
    flex-direction: column;
    align-items: flex-end;
}

#layer-toggle-btn{
    width:44px;
    height:44px;
    background:rgba(15,23,42,0.9);
    border:2px solid #334155;
    border-radius:6px;
    color:white;
    cursor:pointer;
    font-size: 18px;
    box-shadow: 0 2px 6px rgba(0,0,0,0.3);
}

.map-panel{
    background:rgba(15,23,42,0.95);
    border:1px solid #334155;
    border-radius:8px;
    padding:15px;
    width:250px;
    margin-top:10px;
    display:none;
    color:white;
    box-shadow: 0 4px 15px rgba(0,0,0,0.5);
}

.map-panel.active{
    display:block;
}

.map-panel h3{
    color:#38bdf8;
    margin-bottom:8px;
    margin-top:12px;
    font-size:13px;
    border-bottom: 1px solid #334155;
    padding-bottom:4px;
}
.map-panel h3:first-of-type {
    margin-top: 0;
}

/* INLINE ALIGNMENT FOR CONTROLS */
.control-row {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 4px 0;
    cursor: pointer;
    font-size: 13px;
}
.control-row input[type="radio"],
.control-row input[type="checkbox"] {
    width: 16px;
    height: 16px;
    margin: 0;
    cursor: pointer;
    accent-color: #38bdf8;
}

/* COORDS */
#coords-display{
    position:absolute;
    bottom:15px;
    left:50%;
    transform:translateX(-50%);
    background:rgba(15,23,42,0.8);
    color:#38bdf8;
    padding:4px 12px;
    border-radius:20px;
    font-size:12px;
    z-index:1000;
}

/* LABEL */
.cadastral-label{
    background:transparent !important;
    border:none !important;
    box-shadow:none !important;
    color:yellow !important;
    font-weight:bold !important;
    font-size:12px !important;
    text-shadow:
        -1px -1px 0 black,
        1px -1px 0 black,
        -1px 1px 0 black,
        1px 1px 0 black;
}

/* MOBILE VIEW */
@media(max-width:768px){
    #sidebar{
        position:absolute;
        height:100%;
        left:0;
        top:0;
    }
    #sidebar.collapsed{
        margin-left:-340px;
    }
    #map-wrapper{
        width:100%;
    }
    #location-btn {
        right: 70px;
    }
    .leaflet-bottom.leaflet-right{
        bottom:70px !important;
    }
    .leaflet-control-zoom{
        margin-top:60px !important;
    }
    #coords-display{
        font-size:10px;
        padding:3px 8px;
    }
}
</style>
</head>

<body>
<button id="sidebarToggle">☰</button>

<div id="loadingOverlay">
    <div class="spinner"></div>
    <div>Processing GIS Data...</div>
</div>

<div id="loginOverlay">
    <div class="loginCard">
        <h2>Nanded Survey Georeferencing</h2>
        <input type="text" id="username" placeholder="Username">
        <input type="password" id="password" placeholder="Password">
        <button onclick="login()">Login</button>
        <div id="loginError"></div>
    </div>
</div>

<div id="sidebar">
    <h2>Survey Number Maps</h2>

    <label>Select Taluka</label>
    <select id="talukaSelect" disabled>
        <option value="">-- Select Taluka --</option>
    </select>

    <label>Select Village</label>
    <select id="villageSelect" disabled>
        <option value="">-- Select Village --</option>
    </select>

    <label>Search Survey Number</label>
    <input type="text" id="searchBox" placeholder="Enter Survey No" disabled>

    <button id="searchBtn" class="primary-btn" disabled>Search Survey</button>

    <div style="margin-top:15px;">
        <button class="primary-btn" onclick="toggleDownloadMenu()">Download Data ⬇️</button>
        <div id="downloadMenu" class="download-menu">
            <button class="download-btn dxf-btn" onclick="downloadDXF()">Download DXF</button>
            <button class="download-btn kml-btn" onclick="downloadKML()">Download KML</button>
        </div>
    </div>

    <div id="status">Ready...</div>
</div>

<div id="map-wrapper">
    <div id="map"></div>
    
    <button id="location-btn" title="Find My Location">🎯</button>

    <div id="coords-display">Lat: 0.00000, Lng: 0.00000</div>

    <div id="layer-panel-wrapper">
        <button id="layer-toggle-btn" title="Toggle Layers Panel">🥞</button>
        <div id="right-layer-panel" class="map-panel">
            
            <h3>Basemaps</h3>
            <label class="control-row">
                <input type="radio" name="basemap" value="hybrid" checked> 
                <span>Google Hybrid</span>
            </label>
            <label class="control-row">
                <input type="radio" name="basemap" value="satellite"> 
                <span>Google Satellite</span>
            </label>
            <label class="control-row">
                <input type="radio" name="basemap" value="road"> 
                <span>Google Road</span>
            </label>
            <label class="control-row">
                <input type="radio" name="basemap" value="osm"> 
                <span>OSM</span>
            </label>

            <h3>GIS Layers</h3>
            <label class="control-row">
                <input type="checkbox" id="toggle-polygon" checked disabled> 
                <span>Polygons (Survey Boundaries)</span>
            </label>
            <label class="control-row">
                <input type="checkbox" id="toggle-line" checked disabled> 
                <span>Lines (Roads/Waterways)</span>
            </label>
            <label class="control-row">
                <input type="checkbox" id="toggle-point" checked disabled> 
                <span>Points (Labels/Texts)</span>
            </label>
        </div>
    </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet-measure/dist/leaflet-measure.js"></script>

<script>
/* SIDEBAR TOGGLE */
const sidebar = document.getElementById("sidebar");
const sidebarToggle = document.getElementById("sidebarToggle");

sidebarToggle.addEventListener("click", () => {
    sidebar.classList.toggle("collapsed");
    setTimeout(() => {
        map.invalidateSize();
    }, 300);
});

/* USERS */
const users = {
    "Admin": { password: "Admin@321", access: "ALL" },
    "Nanded_district": { password: "Nanded@123", access: "ALL" }
};

/* FIX MAP JUMP */
L.Popup.prototype._adjustPan = function(){};
L.Tooltip.prototype._adjustPan = function(){};

/* MAP */
const map = L.map('map',{
    zoomControl:false,
    doubleClickZoom:false
}).setView([19.16,77.31],10);

L.control.zoom({ position:'topleft' }).addTo(map);
L.control.scale({ imperial:false, metric:true, position:'bottomleft' }).addTo(map);

/* MEASURE */
const measureControl = new L.Control.Measure({
    position:'bottomright',
    primaryLengthUnit:'meters',
    secondaryLengthUnit:'kilometers',
    primaryAreaUnit:'sqmeters',
    secondaryAreaUnit:'hectares'
});
measureControl.addTo(map);

/* BASEMAPS */
const basemaps = {
    hybrid: L.tileLayer('https://mt1.google.com/vt/lyrs=y&x={x}&y={y}&z={z}', {maxZoom:22}).addTo(map),
    satellite: L.tileLayer('https://mt1.google.com/vt/lyrs=s&x={x}&y={y}&z={z}', {maxZoom:22}),
    road: L.tileLayer('https://mt1.google.com/vt/lyrs=m&x={x}&y={y}&z={z}', {maxZoom:22}),
    osm: L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {maxZoom:19})
};

let currentBasemap = basemaps.hybrid;

/* BASEMAP SWITCH */
document.getElementsByName("basemap").forEach(radio => {
    radio.addEventListener("change", function(e) {
        map.removeLayer(currentBasemap);
        currentBasemap = basemaps[e.target.value];
        map.addLayer(currentBasemap);
    });
});

/* PANEL TOGGLE */
document.getElementById("layer-toggle-btn").addEventListener("click", function(){
    document.getElementById("right-layer-panel").classList.toggle("active");
});

/* COORDS ENGINE */
map.on("mousemove", function(e){
    document.getElementById("coords-display").innerHTML =
    `Lat: ${e.latlng.lat.toFixed(5)}, Lng: ${e.latlng.lng.toFixed(5)}`;
});

/* GPS LOCATION ENGINE */
document.getElementById("location-btn").addEventListener("click", function() {
    setStatus("Searching device location...");
    map.locate({ setView: true, maxZoom: 16 });
});
map.on('locationfound', function(e) {
    L.circle(e.latlng, e.accuracy).addTo(map);
    setStatus("🎯 Located successfully");
});
map.on('locationerror', function(e) {
    alert("Location access denied or unavailable.");
    setStatus("❌ Location Error");
});

/* GLOBALS & CONFIG */
let polygonLayer = null;
let lineLayer = null;
let pointLayer = null;
let highlightLayer = null;
let activeUser = null;

let githubUser = "";
let repoName = "";
let baseURL = "";

if (window.location.hostname === "localhost" || window.location.protocol === "file:") {
    githubUser = "YOUR_GITHUB_USERNAME";  
    repoName = "YOUR_REPO_NAME";          
    baseURL = `https://raw.githubusercontent.com/${githubUser}/${repoName}/main/`;
} else {
    githubUser = window.location.hostname.split('.')[0];
    repoName = window.location.pathname.split('/')[1];
    baseURL = window.location.origin + "/" + repoName + "/";
}

/* INTERACTIVE GIS LAYER VISIBILITY BINDINGS */
document.getElementById("toggle-polygon").addEventListener("change", function() {
    if (polygonLayer) {
        this.checked ? map.addLayer(polygonLayer) : map.removeLayer(polygonLayer);
    }
});
document.getElementById("toggle-line").addEventListener("change", function() {
    if (lineLayer) {
        this.checked ? map.addLayer(lineLayer) : map.removeLayer(lineLayer);
    }
});
document.getElementById("toggle-point").addEventListener("change", function() {
    if (pointLayer) {
        this.checked ? map.addLayer(pointLayer) : map.removeLayer(pointLayer);
    }
});

/* STATUS */
function setStatus(msg){
    document.getElementById("status").innerHTML = msg;
}

function showLoading(){
    document.getElementById("loadingOverlay").style.display="flex";
}

function hideLoading(){
    document.getElementById("loadingOverlay").style.display="none";
}

/* LOGIN */
function login(){
    const username = document.getElementById("username").value.trim();
    const password = document.getElementById("password").value.trim();

    if(users[username] && users[username].password === password){
        activeUser = users[username];
        document.getElementById("loginOverlay").style.display = "none";
        loadTalukas();
    } else {
        document.getElementById("loginError").innerHTML = "Invalid Login";
    }
}

/* LOAD TALUKAS */
async function loadTalukas(){
    try{
        setStatus("Loading Talukas...");
        const res = await fetch(`https://api.github.com/repos/${githubUser}/${repoName}/contents`);
        const data = await res.json();
        
        if (data.message && data.message.includes("Not Found")) {
            throw new Error("Repository configuration error. Please verify credentials.");
        }

        const talukas = data.filter(item => item.type === "dir");
        const select = document.getElementById("talukaSelect");

        select.innerHTML = `<option value="">-- Select Taluka --</option>`;
        talukas.forEach(item=>{
            const option = document.createElement("option");
            option.value = item.name;
            option.textContent = item.name;
            select.appendChild(option);
        });

        select.disabled = false;
        setStatus("✅ Talukas Loaded");
    }catch(err){
        console.error(err);
        setStatus("❌ Taluka Load Failed: " + err.message);
    }
}

/* LOAD VILLAGES */
document.getElementById("talukaSelect").addEventListener("change", async function(){
    const taluka = this.value;
    if(!taluka) return;

    try{
        const res = await fetch(`https://api.github.com/repos/${githubUser}/${repoName}/contents/${taluka}`);
        const data = await res.json();
        const villages = data.filter(item => item.type === "dir");
        const select = document.getElementById("villageSelect");

        select.innerHTML = `<option value="">-- Select Village --</option>`;
        villages.forEach(v=>{
            const option = document.createElement("option");
            option.value = v.name;
            option.textContent = v.name;
            select.appendChild(option);
        });

        select.disabled = false;
        setStatus("✅ Villages Loaded");
    }catch(err){
        console.error(err);
        setStatus("❌ Village Load Failed");
    }
});

/* LOAD GIS DATA */
document.getElementById("villageSelect").addEventListener("change", async function(){
    const taluka = document.getElementById("talukaSelect").value;
    const village = this.value;
    if(!village) return;

    try{
        showLoading();

        if(polygonLayer) map.removeLayer(polygonLayer);
        if(lineLayer) map.removeLayer(lineLayer);
        if(pointLayer) map.removeLayer(pointLayer);

        // Reset and disable UI checkboxes until layers are fetched
        document.getElementById("toggle-polygon").disabled = true;
        document.getElementById("toggle-line").disabled = true;
        document.getElementById("toggle-point").disabled = true;

        const res = await fetch(`https://api.github.com/repos/${githubUser}/${repoName}/contents/${taluka}/${village}`);
        const files = await res.json();

        let polygonFile = null;
        let lineFile = null;
        let pointFile = null;

        files.forEach(file=>{
            const name = file.name.toLowerCase();
            if(name.includes("polygon") || name.includes("poly")) polygonFile = file.name;
            else if(name.includes("line")) lineFile = file.name;
            else if(name.includes("point") || name.includes("text")) pointFile = file.name;
        });

        /* PROCESS POLYGONS */
        if(polygonFile){
            const polygonData = await (await fetch(`${baseURL}${taluka}/${village}/${polygonFile}`)).json();

            polygonLayer = L.geoJSON(polygonData,{
                renderer:L.canvas(),
                style:{ color:"red", weight:1, fillOpacity:0.02 },
                onEachFeature:(feature,layer)=>{
                    const props = feature.properties || {};
                    const survey = props.survey_no || props.Survey_No || props.gat_no || props.Gat_No || props.sr_no || props.SR_NO || props.Text;

                    if(survey){
                        layer.bindTooltip(String(survey), {
                            permanent:true,
                            direction:"center",
                            className:"cadastral-label"
                        });
                    }
                }
            }).addTo(map);

            document.getElementById("toggle-polygon").checked = true;
            document.getElementById("toggle-polygon").disabled = false;
            map.fitBounds(polygonLayer.getBounds(), { padding:[20,20], maxZoom:20 });
        }

        /* PROCESS LINES */
        if(lineFile){
            const lineData = await (await fetch(`${baseURL}${taluka}/${village}/${lineFile}`)).json();

            lineLayer = L.geoJSON(lineData,{
                renderer:L.canvas(),
                style:function(feature){
                    const source = ((feature.properties || {}).sourcel || "").toString();
                    if(source.includes("Road")) return { color:"black", weight:2 };
                    if(source.includes("River") || source.includes("Nala")) return { color:"blue", weight:2 };
                    return { color:"#00ffff", weight:1.5 };
                }
            }).addTo(map);

            document.getElementById("toggle-line").checked = true;
            document.getElementById("toggle-line").disabled = false;
        }

        /* PROCESS POINTS */
        if(pointFile){
            const pointData = await (await fetch(`${baseURL}${taluka}/${village}/${pointFile}`)).json();

            pointLayer = L.geoJSON(pointData,{
                renderer:L.canvas(),
                pointToLayer:(feature,latlng)=> L.circleMarker(latlng,{ radius:0, opacity:0, fillOpacity:0 }),
                onEachFeature:(feature,layer)=>{
                    const label = feature.properties.Text || feature.properties.name;
                    if(label){
                        layer.bindTooltip(String(label), {
                            permanent:true,
                            direction:"top",
                            className:"cadastral-label"
                        });
                    }
                }
            }).addTo(map);

            document.getElementById("toggle-point").checked = true;
            document.getElementById("toggle-point").disabled = false;
        }

        document.getElementById("searchBox").disabled=false;
        document.getElementById("searchBtn").disabled=false;
        setStatus("✅ GIS Loaded");
    }catch(err){
        console.error(err);
        setStatus("❌ GIS Loading Failed");
    }finally{
        hideLoading();
    }
});

/* SEARCH */
document.getElementById("searchBtn").addEventListener("click",searchSurvey);

function searchSurvey(){
    const val = document.getElementById("searchBox").value.trim().toLowerCase();
    if(!val || !polygonLayer) return;

    if(highlightLayer) map.removeLayer(highlightLayer);

    polygonLayer.eachLayer(layer=>{
        const props = layer.feature.properties || {};
        const survey = props.survey_no || props.Survey_No || props.gat_no || props.Gat_No || props.sr_no || props.SR_NO;

        if(survey && String(survey).trim().toLowerCase() === val){
            highlightLayer = L.geoJSON(layer.feature,{
                style:{ color:"#00ffff", weight:4, fillOpacity:0.35 }
            }).addTo(map);

            map.fitBounds(layer.getBounds(), { maxZoom:20, padding:[40,40] });
        }
    });
}

/* DOWNLOAD MENU */
function toggleDownloadMenu(){
    const menu = document.getElementById("downloadMenu");
    menu.style.display = menu.style.display === "block" ? "none" : "block";
}

/* PROJECTION REFERENCE */
proj4.defs("EPSG:32643", "+proj=utm +zone=43 +datum=WGS84 +units=m +no_defs");

/* DXF DOWNLOAD */
function downloadDXF(){
    if(!polygonLayer){
        alert("No polygon loaded");
        return;
    }

    let dxf = `\n0\nSECTION\n2\nENTITIES\n`;

    polygonLayer.eachLayer(layer=>{
        const geom = layer.feature.geometry;
        if(geom.type === "Polygon"){
            geom.coordinates.forEach(ring=>{ dxf += buildDXFPolyline(ring); });
        } else if(geom.type === "MultiPolygon"){
            geom.coordinates.forEach(poly=>{
                poly.forEach(ring=>{ dxf += buildDXFPolyline(ring); });
            });
        }
    });

    dxf += `\n0\nENDSEC\n0\nEOF\n`;

    const blob = new Blob([dxf],{ type:'application/dxf' });
    const link = document.createElement("a");
    link.href = URL.createObjectURL(blob);
    link.download = "survey_data.dxf";
    link.click();
}

function buildDXFPolyline(ring){
    let output = `\n0\nPOLYLINE\n8\n0\n66\n1\n70\n1\n`;
    ring.forEach(coord=>{
        const p = proj4("EPSG:4326", "EPSG:32643", [coord[0],coord[1]]);
        output += `\n0\nVERTEX\n8\n0\n10\n${p[0]}\n20\n${p[1]}\n30\n0\n`;
    });
    output += `\n0\nSEQEND\n`;
    return output;
}

/* KML DOWNLOAD */
function downloadKML(){
    if(!polygonLayer){
        alert("No polygon loaded");
        return;
    }

    let kml = `<?xml version="1.0" encoding="UTF-8"?>\n<kml xmlns="http://www.opengis.net/kml/2.2">\n<Document>\n`;

    polygonLayer.eachLayer(layer=>{
        const geom = layer.feature.geometry;
        if(geom.type === "Polygon"){
            kml += buildKMLPolygon(geom.coordinates);
        } else if(geom.type === "MultiPolygon"){
            geom.coordinates.forEach(poly=>{ kml += buildKMLPolygon(poly); });
        }
    });

    kml += `\n</Document>\n</kml>\n`;

    const blob = new Blob([kml], { type:'application/vnd.google-earth.kml+xml' });
    const link = document.createElement("a");
    link.href = URL.createObjectURL(blob);
    link.download = "survey_data.kml";
    link.click();
}

function buildKMLPolygon(coordsArray){
    const ring = coordsArray[0];
    let output = `\n<Placemark>\n<Polygon>\n<tessellate>1</tessellate>\n<outerBoundaryIs>\n<LinearRing>\n<coordinates>\n`;
    ring.forEach(coord=>{ output += `\n${coord[0]},${coord[1]},0\n`; });
    const first = ring[0];
    output += `\n${first[0]},${first[1]},0\n`;
    output += `\n</coordinates>\n</LinearRing>\n</outerBoundaryIs>\n</Polygon>\n</Placemark>\n`;
    return output;
}
