
<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Nanded GIS Portal</title>

<link rel="stylesheet"
href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<style>
body{
    margin:0;
    display:flex;
    height:100vh;
    font-family:Arial;
}

#sidebar{
    width:320px;
    background:#0f172a;
    color:white;
    padding:15px;
    overflow:auto;
}

#map{
    flex:1;
}

select,input,button{
    width:100%;
    padding:10px;
    margin-top:10px;
    border-radius:6px;
}

button{
    background:#0284c7;
    color:white;
    border:none;
}

#login{
    position:fixed;
    inset:0;
    background:rgba(0,0,0,0.8);
    display:flex;
    justify-content:center;
    align-items:center;
    z-index:9999;
}

#loginBox{
    background:white;
    padding:20px;
    border-radius:10px;
    width:300px;
}

.cadastral-label{
    background:transparent !important;
    border:none !important;
    box-shadow:none !important;
    color:yellow !important;
    font-weight:bold !important;
    text-shadow:
    -1px -1px 0 black,
    1px -1px 0 black,
    -1px 1px 0 black,
    1px 1px 0 black;
}
</style>
</head>
<body>

<div id="login">
<div id="loginBox">
<h3>Nanded GIS Portal</h3>

<input type="text"
id="username"
placeholder="Username">

<input type="password"
id="password"
placeholder="Password">

<button onclick="login()">
Login
</button>

<div id="error"
style="color:red;margin-top:10px;"></div>

</div>
</div>

<div id="sidebar">

<h2>Nanded GIS Portal</h2>

<select id="talukaSelect" disabled>
<option value="">Select Taluka</option>
</select>

<select id="villageSelect" disabled>
<option value="">Select Village</option>
</select>

<input type="text"
id="searchBox"
placeholder="Survey Number"
disabled>

<button id="searchBtn" disabled>
Search Survey
</button>

<div id="status"></div>

</div>

<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>

/* =====================================================
   USERS
===================================================== */

const users = {

"Admin":{
password:"Admin@321",
access:"ALL"
},

"Ardhapur_taluka":{
password:"Ardhapur@123",
access:["Ardhapur"]
},

"Bhokar_taluka":{
password:"Bhokar@123",
access:["Bhokar"]
},

"Biloli_taluka":{
password:"Biloli@123",
access:["Biloli"]
},

"Deglur_taluka":{
password:"Deglur@123",
access:["Deglur"]
},

"Dharmabad_taluka":{
password:"Dharmabad@123",
access:["Dharmabad"]
}

};

/* =====================================================
   MAP
===================================================== */

const map = L.map('map').setView([19.16,77.31],10);

L.tileLayer(
'https://mt1.google.com/vt/lyrs=y&x={x}&y={y}&z={z}',
{
maxZoom:22
}
).addTo(map);

/* =====================================================
   GLOBALS
===================================================== */

let polygonLayer;
let lineLayer;
let pointLayer;
let highlightLayer;
let currentUser;

/* =====================================================
   GITHUB PATHS
===================================================== */

const githubUser =
window.location.hostname.split('.')[0];

const repoName =
window.location.pathname.split('/')[1];

const baseURL =
window.location.origin + "/" + repoName + "/";

/* =====================================================
   STATUS
===================================================== */

function setStatus(msg){
    document.getElementById('status').innerHTML = msg;
}

/* =====================================================
   LOGIN
===================================================== */

function login(){

const u =
document.getElementById('username').value.trim();

const p =
document.getElementById('password').value.trim();

if(users[u] && users[u].password === p){

currentUser = users[u];

document.getElementById('login').style.display='none';

loadTalukas();

}else{

document.getElementById('error').innerHTML =
'Invalid Login';
}
}

/* =====================================================
   TALUKAS
===================================================== */

function loadTalukas(){

const talukas = [
'Ardhapur','Bhokar','Biloli',
'Deglur','Dharmabad'
];

const talukaSelect =
document.getElementById('talukaSelect');

if(currentUser.access === 'ALL'){

    talukas.forEach(t=>{

        talukaSelect.innerHTML +=
        `<option value="${t}">${t}</option>`;
    });

}else{

    currentUser.access.forEach(t=>{

        talukaSelect.innerHTML +=
        `<option value="${t}">${t}</option>`;
    });
}

 talukaSelect.disabled = false;
}

/* =====================================================
   LOAD VILLAGES
===================================================== */

document.getElementById('talukaSelect')
.addEventListener('change',async function(){

const taluka = this.value;

const villageSelect =
document.getElementById('villageSelect');

villageSelect.innerHTML =
'<option>Loading...</option>';

try{

const api =
`https://api.github.com/repos/${githubUser}/${repoName}/contents/${taluka}`;

const res = await fetch(api);

const data = await res.json();

villageSelect.innerHTML =
'<option value="">Select Village</option>';

for(const item of data){

    if(item.type === 'dir'){

        villageSelect.innerHTML +=
        `<option value="${item.name}">${item.name}</option>`;
    }
}

villageSelect.disabled = false;

setStatus('Villages loaded');

}catch(err){

console.error(err);

setStatus('Village loading failed');
}
});

/* =====================================================
   LOAD GEOJSON
===================================================== */

document.getElementById('villageSelect')
.addEventListener('change',async function(){

const taluka =
document.getElementById('talukaSelect').value;

const village = this.value;

try{

setStatus('Loading GeoJSON...');

if(polygonLayer) map.removeLayer(polygonLayer);
if(lineLayer) map.removeLayer(lineLayer);
if(pointLayer) map.removeLayer(pointLayer);

/* POLYGON */

const polygonURL =
baseURL +
`${taluka}/${village}/Polygon.geojson`;

console.log(polygonURL);

const polygonRes = await fetch(polygonURL);

const polygonData = await polygonRes.json();

polygonLayer = L.geoJSON(polygonData,{

style:{
color:'red',
weight:1,
fillOpacity:0.03
},

onEachFeature:(feature,layer)=>{

const survey =
feature.properties?.survey_no ||
feature.properties?.gat_no ||
feature.properties?.Survey_No;

if(survey){

layer.bindTooltip(
String(survey),
{
permanent:true,
className:'cadastral-label'
});
}

layer.bindPopup(
JSON.stringify(feature.properties)
);
}

}).addTo(map);

/* LINE */

const lineURL =
baseURL +
`${taluka}/${village}/Line.geojson`;

fetch(lineURL)
.then(r=>r.json())
.then(data=>{

lineLayer = L.geoJSON(data,{
style:{
color:'cyan',
weight:2
}
}).addTo(map);
});

/* POINT */

const pointURL =
baseURL +
`${taluka}/${village}/Point.geojson`;

fetch(pointURL)
.then(r=>r.json())
.then(data=>{

pointLayer = L.geoJSON(data,{

pointToLayer:(f,latlng)=>{

return L.circleMarker(latlng,{
radius:3,
color:'yellow',
fillColor:'yellow',
fillOpacity:1
});
}

}).addTo(map);
});

map.fitBounds(
polygonLayer.getBounds()
);

setStatus('GeoJSON loaded successfully');

}catch(err){

console.error(err);

setStatus('GeoJSON load failed');
}
});

/* =====================================================
   SEARCH
===================================================== */

document.getElementById('searchBtn')
.addEventListener('click',searchSurvey);

function searchSurvey(){

const val =
document.getElementById('searchBox')
.value
.trim()
.toLowerCase();

if(!polygonLayer) return;

polygonLayer.eachLayer(layer=>{

const props =
layer.feature.properties || {};

const survey =
props.survey_no ||
props.gat_no ||
props.Survey_No;

if(
String(survey)
.toLowerCase() === val
){

if(highlightLayer)
map.removeLayer(highlightLayer);

highlightLayer =
L.geoJSON(layer.feature,{

style:{
color:'cyan',
weight:4,
fillOpacity:0.3
}

}).addTo(map);

map.fitBounds(layer.getBounds());
}
});
}

</script>

</body>
</html>
