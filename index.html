<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nanded Survey Number Georeferencing</title>

<!-- LEAFLET -->
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<link rel="stylesheet" href="https://unpkg.com/leaflet-measure/dist/leaflet-measure.css"/>

<!-- LIBRARIES -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/proj4js/2.9.0/proj4.js"></script>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Segoe UI,Arial,sans-serif;
}

body{
    display:flex;
    height:100vh;
    overflow:hidden;
}

/* LOGIN */
#loginOverlay,
#loadingOverlay{
    position:fixed;
    inset:0;
    background:rgba(0,0,0,0.85);
    display:flex;
    justify-content:center;
    align-items:center;
    z-index:9999;
}

.loginCard{
    width:340px;
    background:white;
    padding:25px;
    border-radius:10px;
}

.loginCard h2{
    margin-bottom:20px;
    text-align:center;
}

.loginCard input{
    width:100%;
    padding:10px;
    margin-top:10px;
    border-radius:6px;
    border:1px solid #ccc;
}

.loginCard button{
    width:100%;
    padding:10px;
    margin-top:15px;
    background:#0284c7;
    color:white;
    border:none;
    border-radius:6px;
    cursor:pointer;
}

#loginError{
    color:red;
    margin-top:10px;
    font-size:13px;
}

/* LOADING */
#loadingOverlay{
    background:rgba(15,23,42,0.85);
    color:#38bdf8;
    flex-direction:column;
    display:none;
}

.spinner{
    border:4px solid rgba(255,255,255,0.1);
    width:40px;
    height:40px;
    border-radius:50%;
    border-left-color:#38bdf8;
    animation:spin 1s linear infinite;
    margin-bottom:15px;
}

@keyframes spin{
    0%{transform:rotate(0deg);}
    100%{transform:rotate(360deg);}
}

/* SIDEBAR */
#sidebar{
    width:340px;
    background:#0f172a;
    color:white;
    padding:15px;
    display:flex;
    flex-direction:column;
    z-index:2000;
    box-shadow:2px 0 10px rgba(0,0,0,0.5);
}

#sidebar h2{
    text-align:center;
    margin-bottom:20px;
    color:#38bdf8;
}

label{
    font-size:13px;
    font-weight:600;
    margin-top:10px;
    display:block;
}

select,
input,
button{
    width:100%;
    padding:10px;
    margin-top:6px;
    border-radius:6px;
    outline:none;
}

select,
input{
    border:1px solid #334155;
    background:#1e293b;
    color:white;
}

.primary-btn{
    border:none;
    background:#0284c7;
    color:white;
    cursor:pointer;
    font-weight:600;
}

.primary-btn:hover{
    background:#0369a1;
}

#status{
    margin-top:15px;
    background:#1e293b;
    padding:10px;
    border-radius:6px;
    font-size:13px;
    line-height:1.5;
}

/* DOWNLOAD */
.download-menu{
    display:none;
    background:#1e293b;
    padding:10px;
    border-radius:6px;
    margin-top:5px;
    border:1px solid #334155;
}

.download-btn{
    width:100%;
    padding:8px;
    margin-top:5px;
    border:none;
    border-radius:4px;
    cursor:pointer;
    font-size:12px;
    font-weight:600;
    color:white;
    text-align:left;
}

.dxf-btn{
    background:#0284c7;
}

.kml-btn{
    background:#10b981;
}

/* MAP */
#map-wrapper{
    flex:1;
    position:relative;
}

#map{
    width:100%;
    height:100%;
}

.leaflet-container:focus{
    outline:none;
}

/* PANEL */
#layer-panel-wrapper{
    position:absolute;
    top:15px;
    right:15px;
    z-index:1000;
}

#layer-toggle-btn{
    width:44px;
    height:44px;
    background:rgba(15,23,42,0.9);
    border:2px solid #334155;
    border-radius:6px;
    color:white;
    cursor:pointer;
}

.map-panel{
    background:rgba(15,23,42,0.95);
    border:1px solid #334155;
    border-radius:8px;
    padding:15px;
    width:220px;
    margin-top:10px;
    display:none;
    color:white;
}

.map-panel.active{
    display:block;
}

.map-panel h3{
    color:#38bdf8;
    margin-bottom:10px;
    font-size:13px;
}

.radio-group{
    display:flex;
    flex-direction:column;
    gap:8px;
}

/* COORDS */
#coords-display{
    position:absolute;
    bottom:15px;
    left:50%;
    transform:translateX(-50%);
    background:rgba(15,23,42,0.8);
    color:#38bdf8;
    padding:4px 12px;
    border-radius:20px;
    font-size:12px;
    z-index:1000;
}

/* LABEL */
.cadastral-label{
    background:transparent !important;
    border:none !important;
    box-shadow:none !important;
    color:yellow !important;
    font-weight:bold !important;
    font-size:12px !important;
    text-shadow:
        -1px -1px 0 black,
        1px -1px 0 black,
        -1px 1px 0 black,
        1px 1px 0 black;
}
</style>
</head>

<body>

<!-- LOADING -->
<div id="loadingOverlay">
    <div class="spinner"></div>
    <div>Processing GIS Data...</div>
</div>

<!-- LOGIN -->
<div id="loginOverlay">
    <div class="loginCard">

        <h2>Nanded Survey Georeferencing</h2>

        <input type="text"
               id="username"
               placeholder="Username">

        <input type="password"
               id="password"
               placeholder="Password">

        <button onclick="login()">Login</button>

        <div id="loginError"></div>

    </div>
</div>

<!-- SIDEBAR -->
<div id="sidebar">

    <h2>Survey Number Maps</h2>

    <label>Select Taluka</label>
    <select id="talukaSelect" disabled>
        <option value="">-- Select Taluka --</option>
    </select>

    <label>Select Village</label>
    <select id="villageSelect" disabled>
        <option value="">-- Select Village --</option>
    </select>

    <label>Search Survey Number</label>
    <input type="text"
           id="searchBox"
           placeholder="Enter Survey No"
           disabled>

    <button id="searchBtn"
            class="primary-btn"
            disabled>

        Search Survey

    </button>

    <!-- DOWNLOAD -->
    <div style="margin-top:15px;">

        <button class="primary-btn"
                onclick="toggleDownloadMenu()">

            Download Data ⬇️

        </button>

        <div id="downloadMenu"
             class="download-menu">

            <button class="download-btn dxf-btn"
                    onclick="downloadDXF()">

                Download DXF

            </button>

            <button class="download-btn kml-btn"
                    onclick="downloadKML()">

                Download KML

            </button>

        </div>

    </div>

    <div id="status">Ready...</div>

</div>

<!-- MAP -->
<div id="map-wrapper">

    <div id="map"></div>

    <div id="coords-display">
        Lat: 0.00000, Lng: 0.00000
    </div>

    <!-- LAYER PANEL -->
    <div id="layer-panel-wrapper">

        <button id="layer-toggle-btn">
            ☰
        </button>

        <div id="right-layer-panel"
             class="map-panel">

            <h3>Basemap</h3>

            <div class="radio-group"
                 id="basemap-toggles">

                <label>
                    <input type="radio"
                           name="basemap"
                           value="hybrid"
                           checked>
                    Google Hybrid
                </label>

                <label>
                    <input type="radio"
                           name="basemap"
                           value="satellite">
                    Google Satellite
                </label>

                <label>
                    <input type="radio"
                           name="basemap"
                           value="road">
                    Google Road
                </label>

                <label>
                    <input type="radio"
                           name="basemap"
                           value="osm">
                    OSM
                </label>

            </div>

        </div>

    </div>

</div>

<!-- SCRIPTS -->
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet-measure/dist/leaflet-measure.js"></script>

<script>

/* USERS */
const users = {

    "Admin":{
        password:"Admin@321",
        access:"ALL"
    },

    "Nanded_district":{
        password:"Nanded@123",
        access:"ALL"
    }

};

/* FIX MAP JUMP */
L.Popup.prototype._adjustPan = function(){};
L.Tooltip.prototype._adjustPan = function(){};

/* MAP */
const map = L.map('map',{
    zoomControl:false,
    doubleClickZoom:false
}).setView([19.16,77.31],10);

L.control.zoom({
    position:'topleft'
}).addTo(map);

L.control.scale({
    imperial:false,
    metric:true,
    position:'bottomleft'
}).addTo(map);

/* MEASURE */
const measureControl =
new L.Control.Measure({
    position:'bottomright',
    primaryLengthUnit:'meters',
    secondaryLengthUnit:'kilometers',
    primaryAreaUnit:'sqmeters',
    secondaryAreaUnit:'hectares'
});

measureControl.addTo(map);

/* BASEMAPS */
const basemaps = {

    hybrid:L.tileLayer(
        'https://mt1.google.com/vt/lyrs=y&x={x}&y={y}&z={z}',
        {maxZoom:22}
    ).addTo(map),

    satellite:L.tileLayer(
        'https://mt1.google.com/vt/lyrs=s&x={x}&y={y}&z={z}',
        {maxZoom:22}
    ),

    road:L.tileLayer(
        'https://mt1.google.com/vt/lyrs=m&x={x}&y={y}&z={z}',
        {maxZoom:22}
    ),

    osm:L.tileLayer(
        'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',
        {maxZoom:19}
    )

};

let currentBasemap = basemaps.hybrid;

/* BASEMAP SWITCH */
document.getElementById("basemap-toggles")
.addEventListener("change",function(e){

    if(e.target.name === "basemap"){

        map.removeLayer(currentBasemap);

        currentBasemap =
        basemaps[e.target.value];

        map.addLayer(currentBasemap);

    }

});

/* PANEL */
document.getElementById("layer-toggle-btn")
.addEventListener("click",function(){

    document.getElementById("right-layer-panel")
    .classList.toggle("active");

});

/* COORDS */
map.on("mousemove",function(e){

    document.getElementById("coords-display")
    .innerHTML =
    `Lat: ${e.latlng.lat.toFixed(5)}, Lng: ${e.latlng.lng.toFixed(5)}`;

});

/* GLOBALS */
let polygonLayer = null;
let lineLayer = null;
let pointLayer = null;
let highlightLayer = null;
let activeUser = null;

const githubUser =
window.location.hostname.split('.')[0];

const repoName =
window.location.pathname.split('/')[1];

const baseURL =
window.location.origin + "/" + repoName + "/";

/* STATUS */
function setStatus(msg){
    document.getElementById("status").innerHTML = msg;
}

function showLoading(){
    document.getElementById("loadingOverlay").style.display="flex";
}

function hideLoading(){
    document.getElementById("loadingOverlay").style.display="none";
}

/* LOGIN */
function login(){

    const username =
    document.getElementById("username").value.trim();

    const password =
    document.getElementById("password").value.trim();

    if(users[username] &&
       users[username].password === password){

        activeUser = users[username];

        document.getElementById("loginOverlay")
        .style.display = "none";

        loadTalukas();

    }else{

        document.getElementById("loginError")
        .innerHTML = "Invalid Login";

    }

}

/* LOAD TALUKAS */
async function loadTalukas(){

    try{

        setStatus("Loading Talukas...");

        const res = await fetch(
            `https://api.github.com/repos/${githubUser}/${repoName}/contents`
        );

        const data = await res.json();

        const talukas =
        data.filter(item => item.type === "dir");

        const select =
        document.getElementById("talukaSelect");

        select.innerHTML =
        `<option value="">-- Select Taluka --</option>`;

        talukas.forEach(item=>{

            const option =
            document.createElement("option");

            option.value = item.name;
            option.textContent = item.name;

            select.appendChild(option);

        });

        select.disabled = false;

        setStatus("✅ Talukas Loaded");

    }catch(err){

        console.error(err);

        setStatus("❌ Taluka Load Failed");

    }

}

/* LOAD VILLAGES */
document.getElementById("talukaSelect")
.addEventListener("change",async function(){

    const taluka = this.value;

    if(!taluka) return;

    try{

        const res = await fetch(
            `https://api.github.com/repos/${githubUser}/${repoName}/contents/${taluka}`
        );

        const data = await res.json();

        const villages =
        data.filter(item => item.type === "dir");

        const select =
        document.getElementById("villageSelect");

        select.innerHTML =
        `<option value="">-- Select Village --</option>`;

        villages.forEach(v=>{

            const option =
            document.createElement("option");

            option.value = v.name;
            option.textContent = v.name;

            select.appendChild(option);

        });

        select.disabled = false;

        setStatus("✅ Villages Loaded");

    }catch(err){

        console.error(err);

    }

});

/* LOAD GIS */
document.getElementById("villageSelect")
.addEventListener("change",async function(){

    const taluka =
    document.getElementById("talukaSelect").value;

    const village = this.value;

    if(!village) return;

    try{

        showLoading();

        if(polygonLayer) map.removeLayer(polygonLayer);
        if(lineLayer) map.removeLayer(lineLayer);
        if(pointLayer) map.removeLayer(pointLayer);

        const res = await fetch(
            `https://api.github.com/repos/${githubUser}/${repoName}/contents/${taluka}/${village}`
        );

        const files = await res.json();

        let polygonFile = null;
        let lineFile = null;
        let pointFile = null;

        files.forEach(file=>{

            const name =
            file.name.toLowerCase();

            if(name.includes("polygon") ||
               name.includes("poly"))
                polygonFile = file.name;

            else if(name.includes("line"))
                lineFile = file.name;

            else if(name.includes("point") ||
                    name.includes("text"))
                pointFile = file.name;

        });

        /* POLYGON */
        if(polygonFile){

            const polygonData =
            await (
                await fetch(
                    `${baseURL}${taluka}/${village}/${polygonFile}`
                )
            ).json();

            polygonLayer =
            L.geoJSON(polygonData,{

                renderer:L.canvas(),

                style:{
                    color:"red",
                    weight:1,
                    fillOpacity:0.02
                },

                onEachFeature:(feature,layer)=>{

                    const props =
                    feature.properties || {};

                    const survey =
                        props.survey_no ||
                        props.Survey_No ||
                        props.gat_no ||
                        props.Gat_No ||
                        props.sr_no ||
                        props.SR_NO ||
                        props.Text;

                    if(survey){

                        layer.bindTooltip(
                            String(survey),
                            {
                                permanent:true,
                                direction:"center",
                                className:"cadastral-label"
                            }
                        );

                    }

                }

            }).addTo(map);

            map.fitBounds(
                polygonLayer.getBounds(),
                {
                    padding:[20,20],
                    maxZoom:20
                }
            );

        }

        /* LINE */
        if(lineFile){

            const lineData =
            await (
                await fetch(
                    `${baseURL}${taluka}/${village}/${lineFile}`
                )
            ).json();

            lineLayer =
            L.geoJSON(lineData,{

                renderer:L.canvas(),

                style:function(feature){

                    const source =
                    ((feature.properties || {}).sourcel || "")
                    .toString();

                    if(source.includes("Road"))
                        return {
                            color:"black",
                            weight:2
                        };

                    if(source.includes("River") ||
                       source.includes("Nala"))
                        return {
                            color:"blue",
                            weight:2
                        };

                    return {
                        color:"#00ffff",
                        weight:1.5
                    };

                }

            }).addTo(map);

        }

        /* POINT */
        if(pointFile){

            const pointData =
            await (
                await fetch(
                    `${baseURL}${taluka}/${village}/${pointFile}`
                )
            ).json();

            pointLayer =
            L.geoJSON(pointData,{

                renderer:L.canvas(),

                pointToLayer:(feature,latlng)=>

                    L.circleMarker(latlng,{
                        radius:0,
                        opacity:0,
                        fillOpacity:0
                    }),

                onEachFeature:(feature,layer)=>{

                    const label =
                    feature.properties.Text ||
                    feature.properties.name;

                    if(label){

                        layer.bindTooltip(
                            String(label),
                            {
                                permanent:true,
                                direction:"top",
                                className:"cadastral-label"
                            }
                        );

                    }

                }

            }).addTo(map);

        }

        document.getElementById("searchBox").disabled=false;
        document.getElementById("searchBtn").disabled=false;

        setStatus("✅ GIS Loaded");

    }catch(err){

        console.error(err);

        setStatus("❌ GIS Loading Failed");

    }finally{

        hideLoading();

    }

});

/* SEARCH */
document.getElementById("searchBtn")
.addEventListener("click",searchSurvey);

function searchSurvey(){

    const val =
    document.getElementById("searchBox")
    .value
    .trim()
    .toLowerCase();

    if(!val || !polygonLayer) return;

    if(highlightLayer)
        map.removeLayer(highlightLayer);

    polygonLayer.eachLayer(layer=>{

        const props =
        layer.feature.properties || {};

        const survey =
            props.survey_no ||
            props.Survey_No ||
            props.gat_no ||
            props.Gat_No ||
            props.sr_no ||
            props.SR_NO;

        if(survey &&
           String(survey).trim().toLowerCase() === val){

            highlightLayer =
            L.geoJSON(layer.feature,{
                style:{
                    color:"#00ffff",
                    weight:4,
                    fillOpacity:0.35
                }
            }).addTo(map);

            map.fitBounds(
                layer.getBounds(),
                {
                    maxZoom:20,
                    padding:[40,40]
                }
            );

        }

    });

}

/* DOWNLOAD MENU */
function toggleDownloadMenu(){

    const menu =
    document.getElementById("downloadMenu");

    menu.style.display =
    menu.style.display === "block"
    ? "none"
    : "block";

}

/* PROJECTION */
proj4.defs(
    "EPSG:32643",
    "+proj=utm +zone=43 +datum=WGS84 +units=m +no_defs"
);

/* DXF */
function downloadDXF(){

    if(!polygonLayer){

        alert("No polygon loaded");

        return;
    }

    let dxf = `
0
SECTION
2
ENTITIES
`;

    polygonLayer.eachLayer(layer=>{

        const geom =
        layer.feature.geometry;

        if(geom.type === "Polygon"){

            geom.coordinates.forEach(ring=>{

                dxf += buildDXFPolyline(ring);

            });

        }

        else if(geom.type === "MultiPolygon"){

            geom.coordinates.forEach(poly=>{

                poly.forEach(ring=>{

                    dxf += buildDXFPolyline(ring);

                });

            });

        }

    });

    dxf += `
0
ENDSEC
0
EOF
`;

    const blob =
    new Blob([dxf],{
        type:'application/dxf'
    });

    const link =
    document.createElement("a");

    link.href =
    URL.createObjectURL(blob);

    link.download =
    "survey_data.dxf";

    link.click();

}

/* BUILD DXF */
function buildDXFPolyline(ring){

    let output = `
0
POLYLINE
8
0
66
1
70
1
`;

    ring.forEach(coord=>{

        const p =
        proj4(
            "EPSG:4326",
            "EPSG:32643",
            [coord[0],coord[1]]
        );

        output += `
0
VERTEX
8
0
10
${p[0]}
20
${p[1]}
30
0
`;

    });

    output += `
0
SEQEND
`;

    return output;
}

/* KML */
function downloadKML(){

    if(!polygonLayer){

        alert("No polygon loaded");

        return;
    }

    let kml = `<?xml version="1.0" encoding="UTF-8"?>
<kml xmlns="http://www.opengis.net/kml/2.2">
<Document>
`;

    polygonLayer.eachLayer(layer=>{

        const geom =
        layer.feature.geometry;

        if(geom.type === "Polygon"){

            kml += buildKMLPolygon(
                geom.coordinates
            );

        }

        else if(geom.type === "MultiPolygon"){

            geom.coordinates.forEach(poly=>{

                kml += buildKMLPolygon(poly);

            });

        }

    });

    kml += `
</Document>
</kml>
`;

    const blob =
    new Blob(
        [kml],
        {
            type:'application/vnd.google-earth.kml+xml'
        }
    );

    const link =
    document.createElement("a");

    link.href =
    URL.createObjectURL(blob);

    link.download =
    "survey_data.kml";

    link.click();

}

/* BUILD KML */
function buildKMLPolygon(coordsArray){

    const ring = coordsArray[0];

    let output = `
<Placemark>
<Polygon>
<tessellate>1</tessellate>
<outerBoundaryIs>
<LinearRing>
<coordinates>
`;

    ring.forEach(coord=>{

        output += `
${coord[0]},${coord[1]},0
`;

    });

    const first = ring[0];

    output += `
${first[0]},${first[1]},0
`;

    output += `
</coordinates>
</LinearRing>
</outerBoundaryIs>
</Polygon>
</Placemark>
`;

    return output;
}

</script>

</body>
</html>
