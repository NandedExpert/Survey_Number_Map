<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Nanded GIS Portal</title>

<link rel="stylesheet"
href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Segoe UI,Arial,sans-serif;
}

body{
    display:flex;
    height:100vh;
    overflow:hidden;
}

/* =====================================================
   LOGIN
===================================================== */

#loginOverlay{
    position:fixed;
    inset:0;
    background:rgba(0,0,0,0.85);
    display:flex;
    justify-content:center;
    align-items:center;
    z-index:9999;
}

.loginCard{
    width:340px;
    background:white;
    padding:25px;
    border-radius:10px;
}

.loginCard h2{
    margin-bottom:20px;
    text-align:center;
}

.loginCard input{
    width:100%;
    padding:10px;
    margin-top:10px;
    border-radius:6px;
    border:1px solid #ccc;
}

.loginCard button{
    width:100%;
    padding:10px;
    margin-top:15px;
    background:#0284c7;
    color:white;
    border:none;
    border-radius:6px;
    cursor:pointer;
}

#loginError{
    color:red;
    margin-top:10px;
    font-size:13px;
}

/* =====================================================
   SIDEBAR
===================================================== */

#sidebar{
    width:340px;
    background:#0f172a;
    color:white;
    padding:15px;
    overflow:auto;
}

#sidebar h2{
    text-align:center;
    margin-bottom:20px;
    color:#38bdf8;
}

label{
    font-size:13px;
    font-weight:600;
    display:block;
    margin-top:10px;
}

select,
input,
button{
    width:100%;
    padding:10px;
    margin-top:6px;
    border-radius:6px;
    outline:none;
}

select,
input{
    border:1px solid #334155;
    background:#1e293b;
    color:white;
}

button{
    border:none;
    background:#0284c7;
    color:white;
    cursor:pointer;
    font-weight:600;
}

button:hover{
    background:#0369a1;
}

#status{
    margin-top:15px;
    background:#1e293b;
    padding:10px;
    border-radius:6px;
    font-size:13px;
    line-height:1.5;
}

/* =====================================================
   MAP
===================================================== */

#map{
    flex:1;
}

/* =====================================================
   LABELS
===================================================== */

.cadastral-label{
    background:transparent !important;
    border:none !important;
    box-shadow:none !important;
    color:yellow !important;
    font-weight:bold !important;
    font-size:12px !important;

    text-shadow:
    -1px -1px 0 black,
     1px -1px 0 black,
    -1px  1px 0 black,
     1px  1px 0 black;
}

</style>

</head>

<body>

<!-- =====================================================
     LOGIN
===================================================== -->

<div id="loginOverlay">

    <div class="loginCard">

        <h2>Nanded GIS Portal</h2>

        <input
        type="text"
        id="username"
        placeholder="Username">

        <input
        type="password"
        id="password"
        placeholder="Password">

        <button onclick="login()">
            Login
        </button>

        <div id="loginError"></div>

    </div>

</div>

<!-- =====================================================
     SIDEBAR
===================================================== -->

<div id="sidebar">

    <h2>Bhumi Abhilekh</h2>

    <label>Select Taluka</label>

    <select id="talukaSelect" disabled>
        <option value="">-- Select Taluka --</option>
    </select>

    <label>Select Village</label>

    <select id="villageSelect" disabled>
        <option value="">-- Select Village --</option>
    </select>

    <label>Search Survey Number</label>

    <input
    type="text"
    id="searchBox"
    placeholder="Enter Survey No"
    disabled>

    <button
    id="searchBtn"
    disabled>
    Search Survey
    </button>

    <div id="status">
        Ready...
    </div>

</div>

<!-- =====================================================
     MAP
===================================================== -->

<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>

/* =====================================================
   USERS
===================================================== */

const users = {

"Admin":{
password:"Admin@321",
access:"ALL"
},

"Nanded_district":{
password:"Nanded@123",
access:"ALL"
},

"Ardhapur_taluka":{
password:"Ardhapur@123",
access:["Ardhapur"]
},

"Bhokar_taluka":{
password:"Bhokar@123",
access:["Bhokar"]
},

"Biloli_taluka":{
password:"Biloli@123",
access:["Biloli"]
},

"Deglur_taluka":{
password:"Deglur@123",
access:["Deglur"]
},

"Dharmabad_taluka":{
password:"Dharmabad@123",
access:["Dharmabad"]
},

"Hadgaon_taluka":{
password:"Hadgaon@123",
access:["Hadgaon"]
},

"Himayatnagar_taluka":{
password:"Himayatnagar@123",
access:["Himayatnagar"]
},

"Kandhar_taluka":{
password:"Kandhar@123",
access:["Kandhar"]
},

"Kinwat_taluka":{
password:"Kinwat@123",
access:["Kinwat"]
},

"Loha_taluka":{
password:"Loha@123",
access:["Loha"]
},

"Mahur_taluka":{
password:"Mahur@123",
access:["Mahur"]
},

"Mudkhed_taluka":{
password:"Mudkhed@123",
access:["Mudkhed"]
},

"Mukhed_taluka":{
password:"Mukhed@123",
access:["Mukhed"]
},

"Naigaon_taluka":{
password:"Naigaon@123",
access:["Naigaon"]
},

"Nanded_taluka":{
password:"Nanded@123",
access:["Nanded"]
},

"Umri_taluka":{
password:"Umri@123",
access:["Umri"]
}

};

/* =====================================================
   MAP
===================================================== */

const map = L.map('map')
.setView([19.16,77.31],10);

const googleHybrid = L.tileLayer(
'https://mt1.google.com/vt/lyrs=y&x={x}&y={y}&z={z}',
{
maxZoom:22
}
).addTo(map);

const googleRoad = L.tileLayer(
'https://mt1.google.com/vt/lyrs=m&x={x}&y={y}&z={z}',
{
maxZoom:22
}
);

const osm = L.tileLayer(
'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',
{
maxZoom:19
}
);

L.control.layers({
"Google Hybrid":googleHybrid,
"Google Road":googleRoad,
"OSM":osm
}).addTo(map);

/* =====================================================
   GLOBALS
===================================================== */

let polygonLayer = null;
let lineLayer = null;
let pointLayer = null;
let highlightLayer = null;

let activeUser = null;

/* =====================================================
   GITHUB
===================================================== */

const githubUser =
window.location.hostname.split('.')[0];

const repoName =
window.location.pathname.split('/')[1];

const baseURL =
window.location.origin + "/" + repoName + "/";

/* =====================================================
   STATUS
===================================================== */

function setStatus(msg){

document.getElementById("status")
.innerHTML = msg;
}

/* =====================================================
   LOGIN
===================================================== */

function login(){

const username =
document.getElementById("username")
.value
.trim();

const password =
document.getElementById("password")
.value
.trim();

if(
users[username] &&
users[username].password === password
){

activeUser = users[username];

document.getElementById("loginOverlay")
.style.display = "none";

loadTalukas();

}else{

document.getElementById("loginError")
.innerHTML = "Invalid Login";
}
}

/* =====================================================
   LOAD TALUKAS FAST
===================================================== */

async function loadTalukas(){

const talukaSelect =
document.getElementById("talukaSelect");

talukaSelect.innerHTML =
`<option>Loading Talukas...</option>`;

try{

setStatus("Fetching talukas...");

const api =
`https://api.github.com/repos/${githubUser}/${repoName}/contents`;

const res = await fetch(api);

const data = await res.json();

const talukas =
data.filter(
item => item.type === "dir"
);

talukaSelect.innerHTML =
`<option value="">-- Select Taluka --</option>`;

talukas.sort((a,b)=>
a.name.localeCompare(b.name)
);

talukas.forEach(item=>{

const talukaName =
item.name;

if(
activeUser.access !== "ALL" &&
!activeUser.access.includes(talukaName)
){
return;
}

const option =
document.createElement("option");

option.value = talukaName;
option.textContent = talukaName;

talukaSelect.appendChild(option);

});

talukaSelect.disabled = false;

setStatus(
`✅ ${talukas.length} talukas loaded`
);

}catch(err){

console.error(err);

setStatus(
"❌ Failed to load talukas"
);
}
}

/* =====================================================
   LOAD VILLAGES FAST
===================================================== */

document.getElementById("talukaSelect")
.addEventListener("change", async function(){

const taluka = this.value;

const villageSelect =
document.getElementById("villageSelect");

villageSelect.innerHTML =
`<option>Loading villages...</option>`;

if(!taluka)
return;

try{

setStatus("Fetching villages...");

const api =
`https://api.github.com/repos/${githubUser}/${repoName}/contents/${taluka}`;

const res = await fetch(api);

const data = await res.json();

const villages =
data.filter(
item => item.type === "dir"
);

villageSelect.innerHTML =
`<option value="">-- Select Village --</option>`;

villages.sort((a,b)=>
a.name.localeCompare(b.name)
);

villages.forEach(village=>{

const option =
document.createElement("option");

option.value = village.name;

option.textContent = village.name;

villageSelect.appendChild(option);

});

villageSelect.disabled = false;

setStatus(
`✅ ${villages.length} villages loaded`
);

}catch(err){

console.error(err);

setStatus(
"❌ Failed to fetch villages"
);
}
});

/* =====================================================
   LOAD GEOJSON
===================================================== */

document.getElementById("villageSelect")
.addEventListener("change", async function(){

const taluka =
document.getElementById("talukaSelect")
.value;

const village =
this.value;

if(!village)
return;

try{

setStatus(
"Loading village layers..."
);

/* CLEAR OLD */

if(polygonLayer)
map.removeLayer(polygonLayer);

if(lineLayer)
map.removeLayer(lineLayer);

if(pointLayer)
map.removeLayer(pointLayer);

if(highlightLayer)
map.removeLayer(highlightLayer);

/* =================================================
   POLYGON
================================================= */

const polygonURL =
baseURL +
`${taluka}/${village}/Polygon.geojson`;

console.log(polygonURL);

const polygonRes =
await fetch(polygonURL);

if(!polygonRes.ok)
throw new Error(
"Polygon.geojson missing"
);

const polygonData =
await polygonRes.json();

polygonLayer =
L.geoJSON(polygonData,{

style:{
color:"red",
weight:1,
fillOpacity:0.03
},

onEachFeature:(feature,layer)=>{

const props =
feature.properties || {};

const survey =
props.survey_no ||
props.Survey_No ||
props.gat_no ||
props.Gat_No ||
props.sr_no ||
props.SR_NO;

if(survey){

layer.bindTooltip(
String(survey),
{
permanent:true,
direction:"center",
className:
"cadastral-label"
}
);
}

let html =
"<table border='1' style='border-collapse:collapse;'>";

for(let key in props){

html +=
`<tr>
<td><b>${key}</b></td>
<td>${props[key]}</td>
</tr>`;
}

html += "</table>";

layer.bindPopup(html);
}

}).addTo(map);

/* =================================================
   LINE
================================================= */

const lineURL =
baseURL +
`${taluka}/${village}/Line.geojson`;

fetch(lineURL)
.then(r=>{

if(!r.ok) return null;

return r.json();

})
.then(data=>{

if(!data) return;

lineLayer =
L.geoJSON(data,{

style:{
color:"cyan",
weight:2
}

}).addTo(map);

});

/* =================================================
   POINT
================================================= */

const pointURL =
baseURL +
`${taluka}/${village}/Point.geojson`;

fetch(pointURL)
.then(r=>{

if(!r.ok) return null;

return r.json();

})
.then(data=>{

if(!data) return;

pointLayer =
L.geoJSON(data,{

pointToLayer:
(feature,latlng)=>{

return L.circleMarker(
latlng,
{
radius:3,
color:"yellow",
fillColor:"yellow",
fillOpacity:1
}
);
}

}).addTo(map);

});

/* FIT */

map.fitBounds(
polygonLayer.getBounds(),
{
padding:[20,20]
}
);

/* ENABLE SEARCH */

document.getElementById("searchBox")
.disabled = false;

document.getElementById("searchBtn")
.disabled = false;

setStatus(
"✅ Village loaded successfully"
);

}catch(err){

console.error(err);

setStatus(
"❌ GeoJSON loading failed"
);
}
});

/* =====================================================
   SEARCH
===================================================== */

document.getElementById("searchBtn")
.addEventListener(
"click",
searchSurvey
);

document.getElementById("searchBox")
.addEventListener(
"keypress",
function(e){

if(e.key === "Enter")
searchSurvey();

}
);

function searchSurvey(){

const val =
document.getElementById("searchBox")
.value
.trim()
.toLowerCase();

if(!val || !polygonLayer)
return;

if(highlightLayer)
map.removeLayer(highlightLayer);

let found = false;

polygonLayer.eachLayer(layer=>{

const props =
layer.feature.properties || {};

const survey =
props.survey_no ||
props.Survey_No ||
props.gat_no ||
props.Gat_No ||
props.sr_no ||
props.SR_NO;

if(
survey &&
String(survey)
.trim()
.toLowerCase() === val
){

found = true;

highlightLayer =
L.geoJSON(layer.feature,{

style:{
color:"#00ffff",
weight:4,
fillOpacity:0.35
}

}).addTo(map);

map.fitBounds(
layer.getBounds(),
{
maxZoom:20,
padding:[40,40]
}
);

layer.openPopup();
}
});

if(found){

setStatus(
`🎯 Survey ${val} found`
);

}else{

setStatus(
`❌ Survey not found`
);

alert(
"Survey number not found"
);
}
}

</script>

</body>
</html>
